<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简博客 · 毛玻璃风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle at 20% 30%, #e9ecef, #d4d9e2);
            min-height: 100vh;
            color: #1f1f1f;
        }
        .glass-panel { background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.6); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
        .navbar { padding: 16px 0; position: sticky; top: 20px; z-index: 100; margin-bottom: 20px; }
        .nav-content { background: rgba(255,255,255,0.7); backdrop-filter: blur(24px); border-radius: 48px; padding: 8px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 600; 
            background: linear-gradient(135deg, #1e3a8a, #2c3e66); 
            background-clip: text; 
            -webkit-background-clip: text; 
            color: transparent; 
            cursor: pointer;
            user-select: none;
        }
        .logo:active { transform: scale(0.98); }
        .nav-links { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .nav-link { text-decoration: none; font-weight: 500; color: #2c2c2c; padding: 6px 14px; border-radius: 32px; transition: 0.2s; }
        .nav-link:hover { background: rgba(0,0,0,0.05); }
        .btn { background: rgba(255,255,255,0.85); border: 0.5px solid rgba(0,0,0,0.08); padding: 8px 20px; border-radius: 32px; font-weight: 500; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 0.85rem; }
        .btn-primary { background: #1e3a8a; color: white; border: none; }
        .btn-primary:hover { background: #2c4a9e; }
        .btn-github { background: #24292e; color: white; border: none; }
        .btn-github:hover { background: #2c3e50; }
        .status-badge { background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
        .sync-status { background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
        .sync-status.syncing { background: #e0e7ff; color: #3730a3; animation: pulse 1s infinite; }
        .sync-status.error { background: #fee2e2; color: #dc2626; }
        .sync-status.success { background: #d1fae5; color: #065f46; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; margin: 40px 0 60px; }
        .blog-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border-radius: 24px; padding: 24px; transition: all 0.25s; border: 1px solid rgba(255,255,255,0.9); cursor: pointer; }
        .blog-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.85); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
        .blog-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .blog-meta { font-size: 0.75rem; color: #4a5568; margin-bottom: 16px; }
        .blog-excerpt { color: #2d3a4b; line-height: 1.45; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        #bilibiliDialog, #githubConfigModal { z-index: 1100; }
        .modal-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(32px); border-radius: 32px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 28px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.4rem; margin-bottom: 20px; }
        .close-btn { font-size: 28px; background: none; border: none; cursor: pointer; opacity: 0.7; }
        input, textarea { width: 100%; padding: 12px 18px; margin: 10px 0 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 28px; background: rgba(255,255,255,0.7); font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { outline: none; border-color: #1e3a8a; background: white; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.85rem; z-index: 1200; max-width: 400px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .article-content { line-height: 1.65; }
        .article-content img { max-width: 100%; border-radius: 20px; margin: 20px 0; }
        .bilibili-player-wrapper { margin: 30px 0; border-radius: 16px; overflow: hidden; background: #000; }
        .bilibili-player { position: relative; width: 100%; padding-bottom: 56.25%; }
        .bilibili-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .toolbar-mini { background: rgba(0,0,0,0.04); border-radius: 48px; padding: 8px 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .tool-btn { background: rgba(255,255,255,0.7); border: none; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .video-preview { margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 16px; text-align: center; min-height: 280px; }
        .giscus-wrapper { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .config-info { background: #f0f9ff; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.8rem; }
        .admin-tools-bar { background: rgba(0,0,0,0.03); border-radius: 40px; padding: 8px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }
        .loading-spinner {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            padding: 20px 40px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .loading-spinner i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @media (max-width: 720px) { .container { padding: 0 16px; } .nav-content { justify-content: center; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-content glass-panel">
        <div class="logo" id="secretLogo">✦ 极简日志</div>
        <div class="nav-links">
            <a href="#" id="homeLink" class="nav-link">首页</a>
            <button class="btn" id="syncFromGithubBtn"><i class="fas fa-download"></i> 同步云端</button>
            <span id="syncStatus" class="sync-status">📡 自动同步中...</span>
            <div id="adminTools" style="display: none;">
                <div class="admin-tools-bar">
                    <button class="btn" id="newPostBtn"><i class="fas fa-plus"></i> 写文章</button>
                    <button class="btn" id="configBtn"><i class="fab fa-github"></i> 云端配置</button>
                    <button class="btn" id="logoutBtn">退出管理</button>

        </div>

</div>

<main class="container"><div id="blogListContainer" class="blog-grid"></div></main>

<!-- 加载遮罩层 -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner">
        <i class="fas fa-spinner"></i>
        <span>正在从云端获取最新文章...</span>
    </div>
</div>

<!-- 云端配置模态框（仅管理员） -->
<div id="githubConfigModal" class="modal">
    <div class="modal-card">
        <div class="modal-header"><span>☁️ 云端配置</span><button class="close-btn" onclick="closeModal('githubConfigModal')">&times;</button></div>
        <div class="config-info">
            <i class="fas fa-info-circle"></i> <strong>配置说明：</strong><br>
            默认使用 wyf2012/Blog 仓库，可直接同步
        </div>
        <label>GitHub 用户名</label>
        <input type="text" id="githubOwner" placeholder="username" value="wyf2012">
        <label>仓库名称</label>
        <input type="text" id="githubRepo" placeholder="myblog" value="Blog">
        <label>GitHub Token（可选，仅保存文章时需要）</label>
        <input type="password" id="githubToken" placeholder="可选，不填则只读">
        <div id="configResult" style="margin: 10px 0; font-size: 13px;"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" id="testConnectionBtn" style="flex:1;">🔍 测试连接</button>
            <button class="btn btn-primary" id="saveConfigBtn" style="flex:1;">💾 保存配置</button>
        </div>
        <button class="btn" id="clearConfigBtn" style="width:100%; margin-top:10px;">🗑️ 重置为默认</button>
    </div>
</div>

<!-- B站视频插入对话框 -->
<div id="bilibiliDialog" class="modal">
    <div class="modal-card">
        <div class="modal-header"><span>📺 插入B站视频</span><button class="close-btn" onclick="closeModal('bilibiliDialog')">&times;</button></div>
        <input type="text" id="bilibiliInput" placeholder="BV号 或 完整链接">
        <div style="display: flex; gap: 10px;"><button class="btn" id="previewVideoBtn" style="flex:1;">🔍 预览</button><button class="btn" id="clearPreviewBtn" style="flex:1;">🗑️ 清除</button></div>
        <div id="videoPreview" class="video-preview"><i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;"><button class="btn btn-primary" id="insertVideoBtn" style="flex:1;">✅ 插入</button><button class="btn" onclick="closeModal('bilibiliDialog')">取消</button></div>
    </div>
</div>

<!-- 文章编辑窗 -->
<div id="editorModal" class="modal">
    <div class="modal-card" style="max-width: 850px;">
        <div class="modal-header"><span id="editorTitle">写文章</span><button class="close-btn" onclick="closeModal('editorModal')">&times;</button></div>
        <div class="toolbar-mini"><button class="tool-btn" onclick="openBilibiliDialog()"><i class="fab fa-bilibili"></i> B站视频</button><button class="tool-btn" onclick="insertImage()"><i class="fas fa-image"></i> 图片</button><button class="tool-btn" onclick="insertLink()"><i class="fas fa-link"></i> 链接</button></div>
        <input type="text" id="postTitle" placeholder="标题">
        <input type="text" id="postSummary" placeholder="摘要">
        <textarea id="postBody" rows="12" placeholder="支持 Markdown...&#10;插入视频: @bilibili:BV号"></textarea>
        <div id="editorError" style="color:#c00;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;"><button class="btn btn-primary" id="savePostBtn">保存</button><button class="btn" onclick="closeModal('editorModal')">取消</button></div>
    </div>
</div>

<!-- 文章详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-card" style="max-width: 980px;">
        <div class="modal-header"><span id="detailTitle"></span><button class="close-btn" onclick="closeModal('detailModal')">&times;</button></div>
        <div id="detailContent" class="article-content"></div>
        <div id="detailAdminActions" style="margin-top:20px;"></div>
        <div id="giscusContainer" class="giscus-wrapper"></div>
    </div>
</div>

<script>
    // ==================== 全局变量 ====================
    let posts = [];
    let isAdmin = false;
    let editId = null;
    let githubConfig = { 
        owner: 'wyf2012', 
        repo: 'Blog', 
        token: '',
        branch: 'main' 
    };
    let clickCount = 0;
    let clickTimer = null;
    let isAutoSyncing = false;
    const STORAGE_FILE = 'blog_posts.json';
    const ADMIN_PASSWORD = 'bixie4.5';
    
    // 备用数据（当网络请求失败时使用）
    const BACKUP_POSTS = [
        { id: "1", title: "🎬 B站视频播放示例", summary: "点击查看如何嵌入B站视频", 
          content: "## 🎬 视频演示\n\n下面是一个B站视频示例：\n\n@bilibili:BV1GJ411x7h7\n\n试试看吧！", 
          date: new Date().toLocaleDateString('zh-CN') },
        { id: "2", title: "📖 使用说明", summary: "页面会自动从云端同步最新文章", 
          content: "## 📖 使用说明\n\n### 自动同步\n- 每次刷新页面会自动从云端获取最新文章\n- 也可以手动点击「同步云端」按钮\n\n### 管理员\n- 点击标题5次进入管理员模式\n- 密码: bixie4.5\n- 可以写文章、编辑、删除\n\n### 云端配置\n- 默认使用 wyf2012/Blog 仓库\n- 公开仓库，无需登录即可同步", 
          date: new Date().toLocaleDateString('zh-CN') }
    ];
    
    // ==================== 工具函数 ====================
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function showToast(msg, isErr=false, duration=4000) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        t.style.background = isErr ? '#c62828' : 'rgba(0,0,0,0.85)';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), duration);
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function updateSyncStatus(status, message) {
        let indicator = document.getElementById('syncStatus');
        if(!indicator) return;
        if(status === 'syncing') {
            indicator.className = 'sync-status syncing';
            indicator.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message || '同步中...'}`;
        } else if(status === 'error') {
            indicator.className = 'sync-status error';
            indicator.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message || '同步失败'}`;
        } else if(status === 'success') {
            indicator.className = 'sync-status success';
            indicator.innerHTML = `<i class="fas fa-check-circle"></i> ${message || '已同步'}`;
            setTimeout(() => {
                if(indicator.className === 'sync-status success') {
                    indicator.innerHTML = `<i class="fas fa-check-circle"></i> 就绪`;
                }
            }, 3000);
        } else {
            indicator.className = 'sync-status';
            indicator.innerHTML = `<i class="fas fa-check-circle"></i> ${message || '就绪'}`;
        }
    }
    
    function showLoading(show) {
        const overlay = document.getElementById('loadingOverlay');
        if(overlay) {
            overlay.style.display = show ? 'flex' : 'none';
        }
    }
    
    function extractBvid(input) { if(!input) return null; let m = input.match(/BV[a-zA-Z0-9]{10}/); return m ? m[0] : null; }
    
    function generatePlayer(bvid) {
        return `<div class="bilibili-player-wrapper"><div class="bilibili-player"><iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&page=1&high_quality=1" allowfullscreen></iframe></div></div>`;
    }
    
    function renderMarkdown(text) {
        if(!text) return '';
        let html = text;
        html = html.replace(/@bilibili:([A-Za-z0-9]+)/gi, (m,b)=>generatePlayer(b));
        html = html.replace(/^(BV[0-9A-Za-z]{10})$/gm, (m,b)=>generatePlayer(b));
        html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:100%; border-radius:16px;">');
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
        return html;
    }
    
    // ==================== 配置管理 ====================
    function loadConfig() {
        try { 
            let saved = localStorage.getItem('blog_github_config'); 
            if(saved){ 
                let cfg = JSON.parse(saved);
                githubConfig = { 
                    owner: cfg.owner || 'wyf2012', 
                    repo: cfg.repo || 'Blog', 
                    token: cfg.token || '',
                    branch: cfg.branch || 'main'
                };
            } 
        } catch(e){}
    }
    
    function saveConfig(owner, repo, token) {
        githubConfig = { owner, repo, token, branch: 'main' };
        localStorage.setItem('blog_github_config', JSON.stringify(githubConfig));
        showToast('配置已保存', false, 2000);
    }
    
    function resetConfig() {
        githubConfig = { owner: 'wyf2012', repo: 'Blog', token: '', branch: 'main' };
        localStorage.removeItem('blog_github_config');
        showToast('已重置为默认配置');
    }
    
    // ==================== 公开读取（带重试机制）====================
    async function fetchFromGithubWithRetry(retries = 2, delay = 1000) {
        const owner = githubConfig.owner || 'wyf2012';
        const repo = githubConfig.repo || 'Blog';
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${STORAGE_FILE}`;
        
        for (let i = 0; i <= retries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (res.status === 404) {
                    console.log('云端文件不存在');
                    return null;
                }
                if (res.status === 403) {
                    console.log(`频率限制，等待后重试... (${i+1}/${retries+1})`);
                    if (i < retries) {
                        await new Promise(r => setTimeout(r, delay * (i + 1)));
                        continue;
                    }
                    throw new Error('GitHub API 频率限制，请稍后重试');
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const parsed = JSON.parse(content);
                
                if (Array.isArray(parsed) && parsed.length > 0) {
                    return parsed;
                }
                return null;
                
            } catch(e) {
                console.error(`尝试 ${i+1} 失败:`, e.message);
                if (i === retries) {
                    throw e;
                }
                await new Promise(r => setTimeout(r, delay));
            }
        }
        return null;
    }
    
    // ==================== 写入（需要 Token）====================
    async function saveToGithub() {
        if(!isAdmin) {
            showToast('只有管理员可以保存文章', true);
            return false;
        }
        
        const owner = githubConfig.owner || 'wyf2012';
        const repo = githubConfig.repo || 'Blog';
        
        if(!githubConfig.token) {
            showToast('未配置 Token，文章仅保存到本地', true);
            return false;
        }
        
        try {
            let content = btoa(encodeURIComponent(JSON.stringify(posts, null, 2)));
            let url = `https://api.github.com/repos/${owner}/${repo}/contents/${STORAGE_FILE}`;
            
            let sha = '';
            try {
                let getRes = await fetch(url, { headers: { 'Authorization': `token ${githubConfig.token}` } });
                if(getRes.ok) { let d = await getRes.json(); sha = d.sha; }
            } catch(e) {}
            
            let res = await fetch(url, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${githubConfig.token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    message: `博客更新 - ${new Date().toLocaleString('zh-CN')} - ${posts.length}篇文章`, 
                    content, 
                    sha, 
                    branch: 'main'
                })
            });
            
            if(res.ok) {
                showToast('✅ 已保存到 GitHub 云端！', false, 2500);
                return true;
            } else {
                let err = await res.json();
                showToast(`❌ 保存失败: ${err.message}`, true, 5000);
                return false;
            }
        } catch(e) { 
            showToast(`❌ 网络错误: ${e.message}`, true, 5000);
            return false; 
        }
    }
    
    // 测试连接
    async function testConnection() {
        const owner = document.getElementById('githubOwner').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        const resultDiv = document.getElementById('configResult');
        
        if(!owner || !repo) {
            resultDiv.innerHTML = '❌ 请填写用户名和仓库名';
            resultDiv.style.color = '#dc2626';
            return false;
        }
        
        resultDiv.innerHTML = '🔄 测试中...';
        resultDiv.style.color = '#3730a3';
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const url = `https://api.github.com/repos/${owner}/${repo}`;
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (res.status === 404) {
                resultDiv.innerHTML = `❌ 仓库 ${owner}/${repo} 不存在`;
                resultDiv.style.color = '#dc2626';
                return false;
            }
            if (res.status === 403) {
                resultDiv.innerHTML = `⚠️ 访问受限，可能是频率限制`;
                resultDiv.style.color = '#f59e0b';
                return false;
            }
            if (!res.ok) {
                resultDiv.innerHTML = `❌ 连接失败: HTTP ${res.status}`;
                resultDiv.style.color = '#dc2626';
                return false;
            }
            
            resultDiv.innerHTML = `✅ 连接成功！仓库可访问`;
            resultDiv.style.color = '#10b981';
            return true;
        } catch(e) {
            resultDiv.innerHTML = `❌ 网络错误: ${e.message}`;
            resultDiv.style.color = '#dc2626';
            return false;
        }
    }
    
    // ==================== 文章同步（核心功能）====================
    async function syncFromCloud(showLoadingIndicator = true, isAutoSync = false) {
        if (isAutoSyncing) return;
        isAutoSyncing = true;
        
        if (showLoadingIndicator) {
            showLoading(true);
        }
        updateSyncStatus('syncing', isAutoSync ? '自动同步中...' : '同步中...');
        
        try {
            const cloudPosts = await fetchFromGithubWithRetry(2, 1500);
            
            if (cloudPosts && Array.isArray(cloudPosts) && cloudPosts.length > 0) {
                posts = cloudPosts;
                localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
                renderBlogList();
                updateSyncStatus('success', isAutoSync ? '自动同步成功' : '同步成功');
                if (showLoadingIndicator) {
                    showToast(`✅ 自动同步成功！已更新 ${posts.length} 篇文章`, false, 2000);
                }
                return true;
            } else {
                // 尝试从本地缓存加载
                let cached = localStorage.getItem('blog_posts_cache');
                if(cached) {
                    try { 
                        posts = JSON.parse(cached); 
                        renderBlogList();
                        updateSyncStatus('error', '云端无数据，使用本地缓存');
                        if (showLoadingIndicator) {
                            showToast('⚠️ 云端无数据，已加载本地缓存', true);
                        }
                        return true;
                    } catch(e) {}
                }
                
                // 使用备用数据
                posts = [...BACKUP_POSTS];
                localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
                renderBlogList();
                updateSyncStatus('error', '云端无数据，使用默认文章');
                if (showLoadingIndicator) {
                    showToast('⚠️ 云端无数据，已加载默认文章', true);
                }
                return false;
            }
        } catch(e) {
            console.error('同步失败:', e);
            
            // 尝试从本地缓存加载
            let cached = localStorage.getItem('blog_posts_cache');
            if(cached) {
                try { 
                    posts = JSON.parse(cached); 
                    renderBlogList();
                    updateSyncStatus('error', '同步失败，使用本地缓存');
                    if (showLoadingIndicator) {
                        showToast(`❌ 同步失败: ${e.message}\n已加载本地缓存`, true, 4000);
                    }
                    return true;
                } catch(err) {}
            }
            
            // 使用备用数据
            posts = [...BACKUP_POSTS];
            renderBlogList();
            updateSyncStatus('error', '同步失败，使用默认文章');
            if (showLoadingIndicator) {
                showToast(`❌ 同步失败: ${e.message}\n已加载默认文章`, true, 5000);
            }
            return false;
        } finally {
            isAutoSyncing = false;
            if (showLoadingIndicator) {
                showLoading(false);
            }
        }
    }
    
    // ==================== 文章加载 ====================
    async function loadPosts() {
        // 先快速显示本地缓存
        let cached = localStorage.getItem('blog_posts_cache');
        if(cached) {
            try { 
                posts = JSON.parse(cached); 
                renderBlogList();
            } catch(e) {}
        } else {
            posts = [...BACKUP_POSTS];
            renderBlogList();
        }
        
        // 自动从云端同步（不显示加载遮罩，静默同步）
        await syncFromCloud(false, true);
    }
    
    async function savePosts() {
        localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
        
        if(isAdmin && githubConfig.token) {
            await saveToGithub();
        } else if(isAdmin && !githubConfig.token) {
            showToast('未配置 Token，文章仅保存到本地', true);
        }
    }
    
    // ==================== UI 渲染 ====================
    function renderBlogList() {
        let container = document.getElementById('blogListContainer');
        if(!container) return;
        if(posts.length===0) { 
            container.innerHTML = '<div style="text-align:center;padding:60px;">✨ 暂无文章，点击「同步云端」获取最新内容</div>'; 
            return; 
        }
        container.innerHTML = posts.map(p => `
            <div class="blog-card" data-id="${p.id}">
                <div class="blog-title">${escapeHtml(p.title)}</div>
                <div class="blog-meta"><i class="far fa-calendar-alt"></i> ${p.date || '未知'}</div>
                <div class="blog-excerpt">${escapeHtml(p.summary || (p.content||'').substring(0,80))}...</div>
                <button class="btn read-more">阅读全文 →</button>
            </div>
        `).join('');
        document.querySelectorAll('.blog-card').forEach(card => { card.addEventListener('click', () => showDetail(card.dataset.id)); });
    }
    
    async function showDetail(id) {
        let post = posts.find(p=>p.id==id);
        if(!post) return;
        document.getElementById('detailTitle').innerText = post.title;
        document.getElementById('detailContent').innerHTML = renderMarkdown(post.content);
        let adminDiv = document.getElementById('detailAdminActions');
        if(isAdmin) adminDiv.innerHTML = `<button class="btn" onclick="editPost('${post.id}')">✏️ 编辑</button><button class="btn" onclick="deletePost('${post.id}')">🗑️ 删除</button>`;
        else adminDiv.innerHTML = '';
        document.getElementById('detailModal').style.display = 'flex';
        
        let container = document.getElementById('giscusContainer');
        if(container) {
            container.innerHTML = '';
            let script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'wyf2012/Blog');
            script.setAttribute('data-repo-id', 'R_kgDORzrk5w');
            script.setAttribute('data-category', 'Announcements');
            script.setAttribute('data-category-id', 'DIC_kwDORzrk584C5jXz');
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', `/article/${post.id}`);
            script.setAttribute('data-theme', 'light');
            script.setAttribute('data-lang', 'zh-CN');
            script.async = true;
            container.appendChild(script);
        }
    }
    
    function editPost(id) {
        if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
        closeModal('detailModal');
        let post = posts.find(p=>p.id==id);
        if(post) {
            editId = id;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postSummary').value = post.summary || '';
            document.getElementById('postBody').value = post.content;
            document.getElementById('editorTitle').innerText = '编辑文章';
            document.getElementById('editorModal').style.display = 'flex';
        }
    }
    
    async function deletePost(id) {
        if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
        if(!confirm('⚠️ 确定删除这篇文章吗？')) return;
        let postTitle = posts.find(p=>p.id==id)?.title || '';
        posts = posts.filter(p=>p.id!=id);
        await savePosts();
        renderBlogList();
        closeModal('detailModal');
        showToast(`✅ 文章「${postTitle}」已删除`);
    }
    
    async function saveCurrentPost() {
        if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
        let title = document.getElementById('postTitle').value.trim();
        let summary = document.getElementById('postSummary').value.trim();
        let content = document.getElementById('postBody').value.trim();
        if(!title || !content) { document.getElementById('editorError').innerText='标题和内容不能为空'; return; }
        document.getElementById('editorError').innerText='';
        let now = new Date().toLocaleDateString('zh-CN');
        
        let isNew = !editId;
        if(editId) {
            let idx = posts.findIndex(p=>p.id==editId);
            if(idx!==-1) posts[idx] = {...posts[idx], title, summary, content, date: now};
            editId=null;
        } else {
            posts.unshift({ id: Date.now().toString(), title, summary, content, date: now });
        }
        
        await savePosts();
        renderBlogList();
        closeModal('editorModal');
        if(isNew) showToast(`✅ 新文章「${title}」已发布`);
        else showToast(`✅ 文章「${title}」已更新`);
    }
    
    // ==================== UI 交互 ====================
    function openBilibiliDialog() { 
        if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
        document.getElementById('bilibiliInput').value=''; 
        document.getElementById('videoPreview').innerHTML='<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>'; 
        document.getElementById('bilibiliDialog').style.display='flex'; 
    }
    function previewVideo() { let input=document.getElementById('bilibiliInput').value; let bvid=extractBvid(input); let preview=document.getElementById('videoPreview'); if(bvid){ preview.innerHTML=generatePlayer(bvid); showToast(`预览: ${bvid}`); } else { preview.innerHTML='<p style="color:#c00;">❌ 无效的BV号</p>'; showToast('无效的BV号',true); } }
    function insertVideo() { let input=document.getElementById('bilibiliInput').value; let bvid=extractBvid(input); if(!bvid){ showToast('无效的BV号',true); return; } let ta=document.getElementById('postBody'); let ins=`@bilibili:${bvid}`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); closeModal('bilibiliDialog'); showToast('已插入视频'); }
    function insertImage() { if(!isAdmin) { showToast('请先进入管理员模式', true); return; } let url=prompt('图片URL:'); if(url){ let ta=document.getElementById('postBody'); let ins=`![图片](${url})`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); } }
    function insertLink() { if(!isAdmin) { showToast('请先进入管理员模式', true); return; } let text=prompt('链接文字:'); if(text){ let url=prompt('链接URL:'); if(url){ let ta=document.getElementById('postBody'); let ins=`[${text}](${url})`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); } } }
    
    function openConfigModal() {
        if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
        document.getElementById('githubOwner').value = githubConfig.owner || 'wyf2012';
        document.getElementById('githubRepo').value = githubConfig.repo || 'Blog';
        document.getElementById('githubToken').value = githubConfig.token || '';
        document.getElementById('configResult').innerHTML = '';
        document.getElementById('githubConfigModal').style.display = 'flex';
    }
    
    function saveConfigFromForm() {
        const owner = document.getElementById('githubOwner').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        const token = document.getElementById('githubToken').value.trim();
        
        if(!owner || !repo) {
            showToast('请填写用户名和仓库名', true);
            return;
        }
        
        saveConfig(owner, repo, token);
        closeModal('githubConfigModal');
        showToast('配置已保存');
    }
    
    // ==================== 管理员入口 ====================
    function initSecretAdmin() {
        const logo = document.getElementById('secretLogo');
        if(!logo) return;
        
        logo.addEventListener('click', () => {
            clickCount++;
            if(clickTimer) clearTimeout(clickTimer);
            if(clickCount === 5) {
                clickCount = 0;
                const password = prompt('🔐 管理员验证\n\n请输入管理员密码：');
                if(password === ADMIN_PASSWORD) {
                    isAdmin = true;
                    let exp = Date.now() + 24 * 3600000;
                    localStorage.setItem('blog_admin', 'true');
                    localStorage.setItem('blog_admin_expiry', exp);
                    document.getElementById('adminTools').style.display = 'block';
                    showToast('✅ 管理员模式已启用', false, 2000);
                } else if(password !== null) {
                    showToast('❌ 密码错误', true, 2000);
                }
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });
    }
    
    function checkLogin() { 
        let exp = localStorage.getItem('blog_admin_expiry'); 
        if(localStorage.getItem('blog_admin')==='true' && exp && Date.now()<parseInt(exp)){ 
            isAdmin=true; 
            document.getElementById('adminTools').style.display = 'block';
        } 
    }
    
    function logout() { 
        isAdmin = false; 
        localStorage.removeItem('blog_admin'); 
        localStorage.removeItem('blog_admin_expiry'); 
        document.getElementById('adminTools').style.display = 'none';
        renderBlogList(); 
        showToast('已退出管理员模式'); 
    }
    
    // ==================== 初始化 ====================
    window.onload = async () => {
        loadConfig();
        checkLogin();
        initSecretAdmin();
        
        // 显示加载状态
        updateSyncStatus('syncing', '正在自动同步...');
        
        // 加载文章（会自动触发自动同步）
        await loadPosts();
        
        // 绑定事件
        document.getElementById('syncFromGithubBtn')?.addEventListener('click', () => syncFromCloud(true, false));
        document.getElementById('homeLink')?.addEventListener('click',(e)=>{ e.preventDefault(); renderBlogList(); });
        document.getElementById('newPostBtn')?.addEventListener('click',()=>{ 
            if(!isAdmin) { showToast('请先进入管理员模式', true); return; }
            editId=null; 
            document.getElementById('postTitle').value=''; 
            document.getElementById('postSummary').value=''; 
            document.getElementById('postBody').value=''; 
            document.getElementById('editorTitle').innerText='写新文章'; 
            document.getElementById('editorModal').style.display='flex'; 
        });
        document.getElementById('savePostBtn')?.addEventListener('click',saveCurrentPost);
        document.getElementById('configBtn')?.addEventListener('click', openConfigModal);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('saveConfigBtn')?.addEventListener('click', saveConfigFromForm);
        document.getElementById('clearConfigBtn')?.addEventListener('click', () => {
            resetConfig();
            closeModal('githubConfigModal');
        });
        document.getElementById('testConnectionBtn')?.addEventListener('click', testConnection);
        document.getElementById('previewVideoBtn')?.addEventListener('click',previewVideo);
        document.getElementById('clearPreviewBtn')?.addEventListener('click',()=>{ document.getElementById('videoPreview').innerHTML='<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>'; });
        document.getElementById('insertVideoBtn')?.addEventListener('click',insertVideo);
        
        window.closeModal=closeModal;
        window.openBilibiliDialog=openBilibiliDialog;
        window.insertImage=insertImage;
        window.insertLink=insertLink;
        window.editPost=editPost;
        window.deletePost=deletePost;
    };
</script>
