<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简博客</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle at 20% 30%, #e9ecef, #d4d9e2);
            min-height: 100vh;
            color: #1f1f1f;
        }
        .glass-panel { background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.6); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
        .navbar { padding: 16px 0; position: sticky; top: 20px; z-index: 100; margin-bottom: 20px; }
        .nav-content { background: rgba(255,255,255,0.7); backdrop-filter: blur(24px); border-radius: 48px; padding: 8px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #1e3a8a, #2c3e66); background-clip: text; -webkit-background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .nav-link { text-decoration: none; font-weight: 500; color: #2c2c2c; padding: 6px 14px; border-radius: 32px; transition: 0.2s; }
        .nav-link:hover { background: rgba(0,0,0,0.05); }
        .btn { background: rgba(255,255,255,0.85); border: 0.5px solid rgba(0,0,0,0.08); padding: 8px 20px; border-radius: 32px; font-weight: 500; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 0.85rem; }
        .btn-primary { background: #1e3a8a; color: white; border: none; }
        .btn-primary:hover { background: #2c4a9e; }
        .status-badge { background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
        .sync-status { background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
        .sync-status.warning { background: #fed7aa; color: #9b4d00; }
        .sync-status.error { background: #fee2e2; color: #dc2626; }
        .sync-status.syncing { background: #e0e7ff; color: #3730a3; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; margin: 40px 0 60px; }
        .blog-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border-radius: 24px; padding: 24px; transition: all 0.25s; border: 1px solid rgba(255,255,255,0.9); cursor: pointer; }
        .blog-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.85); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
        .blog-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .blog-meta { font-size: 0.75rem; color: #4a5568; margin-bottom: 16px; }
        .blog-excerpt { color: #2d3a4b; line-height: 1.45; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        #bilibiliDialog, #githubConfigModal { z-index: 1100; }
        .modal-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(32px); border-radius: 32px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 28px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.4rem; margin-bottom: 20px; }
        .close-btn { font-size: 28px; background: none; border: none; cursor: pointer; opacity: 0.7; }
        input, textarea { width: 100%; padding: 12px 18px; margin: 10px 0 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 28px; background: rgba(255,255,255,0.7); font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { outline: none; border-color: #1e3a8a; background: white; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.85rem; z-index: 1200; max-width: 400px; word-break: break-word; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .article-content { line-height: 1.65; }
        .article-content img { max-width: 100%; border-radius: 20px; margin: 20px 0; }
        .bilibili-player-wrapper { margin: 30px 0; border-radius: 16px; overflow: hidden; background: #000; }
        .bilibili-player { position: relative; width: 100%; padding-bottom: 56.25%; }
        .bilibili-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .toolbar-mini { background: rgba(0,0,0,0.04); border-radius: 48px; padding: 8px 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .tool-btn { background: rgba(255,255,255,0.7); border: none; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .video-preview { margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 16px; text-align: center; min-height: 280px; }
        .giscus-wrapper { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .config-info { background: #f0f9ff; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.8rem; }
        .debug-log { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; margin-top: 15px; display: none; }
        @media (max-width: 720px) { .container { padding: 0 16px; } .nav-content { justify-content: center; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-content glass-panel">
        <div class="logo">✦ 极简日志</div>
        <div class="nav-links">
            <a href="#" id="homeLink" class="nav-link">首页</a>
            <span id="syncIndicator" class="sync-status warning"><i class="fas fa-exclamation-triangle"></i> 未配置</span>
            <div id="authSection"><button class="btn" id="adminLoginBtn">管理登录</button></div>
            <div id="adminTools" style="display: none;">
                <button class="btn" id="newPostBtn"><i class="fas fa-plus"></i> 写文章</button>
                <button class="btn" id="configBtn"><i class="fab fa-github"></i> 云端配置</button>
                <button class="btn" id="logoutBtn">退出</button>
                <span class="status-badge"><i class="fas fa-user-check"></i> 已登录</span>
            </div>
        </div>
    </div>
</div>

<main class="container"><div id="blogListContainer" class="blog-grid"></div></main>

<!-- GitHub 配置模态框 -->
<div id="githubConfigModal" class="modal">
    <div class="modal-card">
        <div class="modal-header"><span>☁️ GitHub 云端配置</span><button class="close-btn" onclick="closeModal('githubConfigModal')">&times;</button></div>
        <div class="config-info">
            <i class="fas fa-info-circle"></i> <strong>配置说明：</strong><br>
            1. 访问 <a href="https://github.com/settings/tokens" target="_blank">GitHub Tokens</a><br>
            2. 点击「Generate new token (classic)」<br>
            3. 勾选 <code>repo</code> 权限（完整仓库访问）<br>
            4. 复制生成的 Token<br>
            5. 填写下方信息并测试
        </div>
        <label>GitHub Token</label>
        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        <label>GitHub 用户名</label>
        <input type="text" id="githubOwner" placeholder="username">
        <label>仓库名称</label>
        <input type="text" id="githubRepo" placeholder="myblog">
        <div id="testResult" style="margin: 10px 0; font-size: 13px;"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" id="testGithubBtn" style="flex:1;">🔍 测试连接</button>
            <button class="btn btn-primary" id="saveGithubBtn" style="flex:1;">💾 保存配置</button>
        </div>
        <button class="btn" id="clearGithubBtn" style="width:100%; margin-top:10px;">🗑️ 清除配置</button>
        <div id="debugLog" class="debug-log"></div>
    </div>
</div>

<!-- B站视频插入对话框 -->
<div id="bilibiliDialog" class="modal">
    <div class="modal-card">
        <div class="modal-header"><span>📺 插入B站视频</span><button class="close-btn" onclick="closeModal('bilibiliDialog')">&times;</button></div>
        <input type="text" id="bilibiliInput" placeholder="BV号 或 完整链接">
        <div style="display: flex; gap: 10px;"><button class="btn" id="previewVideoBtn" style="flex:1;">🔍 预览</button><button class="btn" id="clearPreviewBtn" style="flex:1;">🗑️ 清除</button></div>
        <div id="videoPreview" class="video-preview"><i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;"><button class="btn btn-primary" id="insertVideoBtn" style="flex:1;">✅ 插入</button><button class="btn" onclick="closeModal('bilibiliDialog')">取消</button></div>
    </div>
</div>

<!-- 登录模态框 -->
<div id="loginModal" class="modal">
    <div class="modal-card">
        <div class="modal-header"><span>🔐 管理员登录</span><button class="close-btn" onclick="closeModal('loginModal')">&times;</button></div>
        <input type="text" id="loginUser" placeholder="用户名">
        <input type="password" id="loginPass" placeholder="密码">
        <div id="loginError" style="color:#c00;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-primary" id="loginBtn" style="flex:1;">登录</button>
            <button class="btn" id="rememberLoginBtn" style="flex:1;">记住我</button>
        </div>
    </div>
</div>

<!-- 文章编辑窗 -->
<div id="editorModal" class="modal">
    <div class="modal-card" style="max-width: 850px;">
        <div class="modal-header"><span id="editorTitle">写文章</span><button class="close-btn" onclick="closeModal('editorModal')">&times;</button></div>
        <div class="toolbar-mini"><button class="tool-btn" onclick="openBilibiliDialog()"><i class="fab fa-bilibili"></i> B站视频</button><button class="tool-btn" onclick="insertImage()"><i class="fas fa-image"></i> 图片</button><button class="tool-btn" onclick="insertLink()"><i class="fas fa-link"></i> 链接</button></div>
        <input type="text" id="postTitle" placeholder="标题">
        <input type="text" id="postSummary" placeholder="摘要">
        <textarea id="postBody" rows="12" placeholder="支持 Markdown...&#10;插入视频: @bilibili:BV号"></textarea>
        <div id="editorError" style="color:#c00;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;"><button class="btn btn-primary" id="savePostBtn">保存</button><button class="btn" onclick="closeModal('editorModal')">取消</button></div>
    </div>
</div>

<!-- 文章详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-card" style="max-width: 980px;">
        <div class="modal-header"><span id="detailTitle"></span><button class="close-btn" onclick="closeModal('detailModal')">&times;</button></div>
        <div id="detailContent" class="article-content"></div>
        <div id="detailAdminActions" style="margin-top:20px;"></div>
        <div id="giscusContainer" class="giscus-wrapper"></div>
    </div>
</div>

<script>
    // ==================== 全局变量 ====================
    let posts = [];
    let isAdmin = false;
    let editId = null;
    let githubConfig = { token: '', owner: '', repo: '', branch: 'main' };
    const STORAGE_FILE = 'blog_posts.json';
    
    // 管理员密码
    const ADMIN_PASSWORD = 'bixie4.5';
    const ADMIN_USERNAME = 'admin';
    
    // ==================== 工具函数 ====================
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function showToast(msg, isErr=false, duration=4000) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        t.style.background = isErr ? '#c62828' : 'rgba(0,0,0,0.85)';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), duration);
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function addDebugLog(msg) {
        let logDiv = document.getElementById('debugLog');
        if(logDiv) {
            logDiv.style.display = 'block';
            let time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        console.log(msg);
    }
    
    function extractBvid(input) { if(!input) return null; let m = input.match(/BV[a-zA-Z0-9]{10}/); return m ? m[0] : null; }
    
    function generatePlayer(bvid) {
        return `<div class="bilibili-player-wrapper"><div class="bilibili-player"><iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&page=1&high_quality=1" allowfullscreen></iframe></div></div>`;
    }
    
    function renderMarkdown(text) {
        if(!text) return '';
        let html = text;
        html = html.replace(/@bilibili:([A-Za-z0-9]+)/gi, (m,b)=>generatePlayer(b));
        html = html.replace(/^(BV[0-9A-Za-z]{10})$/gm, (m,b)=>generatePlayer(b));
        html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:100%; border-radius:16px;">');
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
        return html;
    }
    
    // ==================== 云端存储 ====================
    function loadGithubConfig() {
        try { 
            let saved = localStorage.getItem('github_blog_config'); 
            if(saved){ 
                let cfg = JSON.parse(saved);
                githubConfig = { 
                    token: cfg.token || '', 
                    owner: cfg.owner || '', 
                    repo: cfg.repo || '',
                    branch: cfg.branch || 'main'
                };
            } 
        } catch(e){}
        updateSyncStatus();
    }
    
    function saveGithubConfig(token, owner, repo, branch = 'main') {
        githubConfig = { token, owner, repo, branch };
        localStorage.setItem('github_blog_config', JSON.stringify(githubConfig));
        updateSyncStatus();
    }
    
    function updateSyncStatus() {
        let indicator = document.getElementById('syncIndicator');
        if(!indicator) return;
        if(githubConfig.token && githubConfig.owner && githubConfig.repo) {
            indicator.className = 'sync-status';
            indicator.innerHTML = `<i class="fab fa-github"></i> ${githubConfig.owner}/${githubConfig.repo}`;
            indicator.title = '已配置云端，点击同步';
            indicator.onclick = () => manualSync();
        } else {
            indicator.className = 'sync-status warning';
            indicator.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 未配置云端`;
            indicator.title = '点击配置云端存储';
            indicator.onclick = () => openGithubConfig();
        }
    }
    
    function setSyncingStatus(syncing) {
        let indicator = document.getElementById('syncIndicator');
        if(!indicator) return;
        if(syncing) {
            indicator.className = 'sync-status syncing';
            indicator.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 同步中...`;
        } else {
            updateSyncStatus();
        }
    }
    
    // 获取仓库默认分支
    async function getDefaultBranch(token, owner, repo) {
        try {
            let res = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(res.ok) {
                let data = await res.json();
                return data.default_branch || 'main';
            }
        } catch(e) {}
        return 'main';
    }
    
    // 测试 GitHub 连接
    async function testGithubConnection() {
        let token = document.getElementById('githubToken').value.trim();
        let owner = document.getElementById('githubOwner').value.trim();
        let repo = document.getElementById('githubRepo').value.trim();
        let resultDiv = document.getElementById('testResult');
        
        if(!token || !owner || !repo) {
            resultDiv.innerHTML = '❌ 请填写完整信息';
            resultDiv.style.color = '#dc2626';
            return false;
        }
        
        addDebugLog(`测试连接: ${owner}/${repo}`);
        resultDiv.innerHTML = '🔄 测试中...';
        resultDiv.style.color = '#3730a3';
        
        try {
            // 测试1: 验证 Token 和仓库
            let repoRes = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if(repoRes.status === 401) {
                resultDiv.innerHTML = '❌ Token 无效或已过期，请重新生成并勾选 repo 权限';
                resultDiv.style.color = '#dc2626';
                addDebugLog('Token 无效');
                return false;
            }
            if(repoRes.status === 404) {
                resultDiv.innerHTML = `❌ 仓库 ${owner}/${repo} 不存在，请先创建仓库`;
                resultDiv.style.color = '#dc2626';
                addDebugLog('仓库不存在');
                return false;
            }
            if(!repoRes.ok) {
                resultDiv.innerHTML = `❌ 连接失败: HTTP ${repoRes.status}`;
                resultDiv.style.color = '#dc2626';
                addDebugLog(`HTTP错误: ${repoRes.status}`);
                return false;
            }
            
            let repoData = await repoRes.json();
            let defaultBranch = repoData.default_branch || 'main';
            addDebugLog(`仓库存在，默认分支: ${defaultBranch}`);
            
            // 测试2: 检查文件读写权限
            let fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${STORAGE_FILE}`;
            let fileRes = await fetch(fileUrl, { headers: { 'Authorization': `token ${token}` } });
            
            if(fileRes.status === 404) {
                resultDiv.innerHTML = `✅ 连接成功！文件将自动创建 (分支: ${defaultBranch})`;
                resultDiv.style.color = '#10b981';
                addDebugLog('文件不存在，可以创建');
                return true;
            }
            if(fileRes.ok) {
                resultDiv.innerHTML = `✅ 连接成功！可以读写文件 (分支: ${defaultBranch})`;
                resultDiv.style.color = '#10b981';
                addDebugLog('文件存在，可以读写');
                return true;
            }
            
            resultDiv.innerHTML = `⚠️ 未知状态: ${fileRes.status}`;
            resultDiv.style.color = '#f59e0b';
            return false;
        } catch(e) {
            addDebugLog(`网络错误: ${e.message}`);
            resultDiv.innerHTML = `❌ 网络错误: ${e.message}`;
            resultDiv.style.color = '#dc2626';
            return false;
        }
    }
    
    // 从 GitHub 加载
    async function loadFromGithub() {
        if(!githubConfig.token || !githubConfig.owner || !githubConfig.repo) return false;
        try {
            setSyncingStatus(true);
            addDebugLog('从 GitHub 加载文章...');
            
            let url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${STORAGE_FILE}`;
            let res = await fetch(url, { headers: { 'Authorization': `token ${githubConfig.token}` } });
            
            if(res.status === 404) { 
                addDebugLog('云端无数据');
                setSyncingStatus(false);
                return false; 
            }
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            
            let data = await res.json();
            let content = decodeURIComponent(escape(atob(data.content)));
            let cloudPosts = JSON.parse(content);
            if(Array.isArray(cloudPosts)) {
                posts = cloudPosts;
                localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
                addDebugLog(`从 GitHub 加载成功，共 ${posts.length} 篇文章`);
                setSyncingStatus(false);
                return true;
            }
        } catch(e) { 
            addDebugLog(`GitHub加载失败: ${e.message}`);
            setSyncingStatus(false);
        }
        return false;
    }
    
    // 保存到 GitHub
    async function saveToGithub(showToastMsg = true) {
        if(!githubConfig.token || !githubConfig.owner || !githubConfig.repo) return false;
        
        try {
            setSyncingStatus(true);
            addDebugLog('保存到 GitHub...');
            
            let content = btoa(encodeURIComponent(JSON.stringify(posts, null, 2)));
            let url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${STORAGE_FILE}`;
            
            // 获取当前文件的 sha 和分支
            let sha = '';
            let branch = githubConfig.branch || 'main';
            try {
                let getRes = await fetch(url, { headers: { 'Authorization': `token ${githubConfig.token}` } });
                if(getRes.ok) { 
                    let d = await getRes.json(); 
                    sha = d.sha;
                    addDebugLog(`获取到文件 sha: ${sha.substring(0,8)}...`);
                }
            } catch(e) {}
            
            let res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubConfig.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: `博客更新 - ${new Date().toLocaleString('zh-CN')} - ${posts.length}篇文章`, 
                    content, 
                    sha, 
                    branch: branch
                })
            });
            
            setSyncingStatus(false);
            
            if(res.ok) {
                addDebugLog('保存到 GitHub 成功');
                if(showToastMsg) showToast('✅ 已成功保存到 GitHub 云端！', false, 2500);
                return true;
            } else {
                let err = await res.json();
                addDebugLog(`保存失败: ${err.message}`);
                if(showToastMsg) showToast(`❌ 云端保存失败: ${err.message}`, true, 5000);
                return false;
            }
        } catch(e) { 
            addDebugLog(`保存异常: ${e.message}`);
            setSyncingStatus(false);
            if(showToastMsg) showToast(`❌ 网络错误: ${e.message}`, true, 5000);
            return false; 
        }
    }
    
    async function savePosts(showCloudToast = true) {
        localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
        
        let cloudSuccess = false;
        if(githubConfig.token && githubConfig.owner && githubConfig.repo) {
            cloudSuccess = await saveToGithub(showCloudToast);
            if(!cloudSuccess && showCloudToast) {
                showToast('⚠️ 云端保存失败，数据已保存到本地', true, 3000);
            }
        } else if(showCloudToast) {
            showToast('💡 未配置云端，数据仅保存在本地', false, 2000);
        }
        return cloudSuccess;
    }
    
    async function loadPosts() {
        let loaded = await loadFromGithub();
        
        if(!loaded) {
            let cached = localStorage.getItem('blog_posts_cache');
            if(cached) {
                try { 
                    posts = JSON.parse(cached); 
                    loaded = true;
                    addDebugLog('从本地缓存加载');
                } catch(e){}
            }
        }
        
        if(!loaded || !posts || posts.length === 0) {
            posts = [
                { id: "1", title: "🎬 B站视频播放示例", summary: "点击查看如何嵌入B站视频", 
                  content: "## 🎬 视频演示\n\n@bilibili:BV1GJ411x7h7\n\n试试看吧！", 
                  date: new Date().toLocaleDateString('zh-CN') },
                { id: "2", title: "☁️ 云端配置指南", summary: "配置GitHub后数据永久保存", 
                  content: "## ☁️ 云端配置\n\n1. 点击右上角「云端配置」\n2. 输入 GitHub Token 和仓库\n3. 点击「测试连接」验证\n4. 保存后自动同步\n\n**清除浏览器数据也不会丢失！**", 
                  date: new Date().toLocaleDateString('zh-CN') }
            ];
            localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
            addDebugLog('使用默认文章');
        }
        
        renderBlogList();
        let cloudStatus = githubConfig.token ? '已连接云端' : '未配置云端';
        showToast(`📚 加载完成，共 ${posts.length} 篇文章 (${cloudStatus})`);
    }
    
    async function manualSync() {
        if(!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
            showToast('请先配置 GitHub', true);
            openGithubConfig();
            return;
        }
        showToast('🔄 正在同步到云端...');
        let ok = await saveToGithub(true);
        if(ok) {
            showToast('✅ 同步成功！');
        }
    }
    
    // ==================== UI 渲染 ====================
    function renderBlogList() {
        let container = document.getElementById('blogListContainer');
        if(!container) return;
        if(posts.length===0) { container.innerHTML='<div style="text-align:center;padding:60px;">✨ 暂无文章，登录后发布</div>'; return; }
        container.innerHTML = posts.map(p => `
            <div class="blog-card" data-id="${p.id}">
                <div class="blog-title">${escapeHtml(p.title)}</div>
                <div class="blog-meta"><i class="far fa-calendar-alt"></i> ${p.date || '未知'}</div>
                <div class="blog-excerpt">${escapeHtml(p.summary || (p.content||'').substring(0,80))}...</div>
                <button class="btn read-more">阅读全文 →</button>
            </div>
        `).join('');
        document.querySelectorAll('.blog-card').forEach(card => { card.addEventListener('click', () => showDetail(card.dataset.id)); });
    }
    
    async function showDetail(id) {
        let post = posts.find(p=>p.id==id);
        if(!post) return;
        document.getElementById('detailTitle').innerText = post.title;
        document.getElementById('detailContent').innerHTML = renderMarkdown(post.content);
        let adminDiv = document.getElementById('detailAdminActions');
        if(isAdmin) adminDiv.innerHTML = `<button class="btn" onclick="editPost('${post.id}')">✏️ 编辑</button><button class="btn" onclick="deletePost('${post.id}')">🗑️ 删除</button>`;
        else adminDiv.innerHTML = '';
        document.getElementById('detailModal').style.display = 'flex';
        
        let container = document.getElementById('giscusContainer');
        if(container) {
            container.innerHTML = '';
            let script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', 'wyf2012/Blog');
            script.setAttribute('data-repo-id', 'R_kgDORzrk5w');
            script.setAttribute('data-category', 'Announcements');
            script.setAttribute('data-category-id', 'DIC_kwDORzrk584C5jXz');
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', `/article/${post.id}`);
            script.setAttribute('data-theme', 'light');
            script.setAttribute('data-lang', 'zh-CN');
            script.async = true;
            container.appendChild(script);
        }
    }
    
    function editPost(id) {
        closeModal('detailModal');
        let post = posts.find(p=>p.id==id);
        if(post) {
            editId = id;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postSummary').value = post.summary || '';
            document.getElementById('postBody').value = post.content;
            document.getElementById('editorTitle').innerText = '编辑文章';
            document.getElementById('editorModal').style.display = 'flex';
        }
    }
    
    async function deletePost(id) {
        if(!confirm('⚠️ 确定删除这篇文章吗？')) return;
        let postTitle = posts.find(p=>p.id==id)?.title || '';
        posts = posts.filter(p=>p.id!=id);
        let success = await savePosts(true);
        renderBlogList();
        closeModal('detailModal');
        if(success) showToast(`✅ 文章「${postTitle}」已删除并同步到云端`);
        else showToast(`⚠️ 文章已从本地删除，但云端同步失败`, true);
    }
    
    async function saveCurrentPost() {
        let title = document.getElementById('postTitle').value.trim();
        let summary = document.getElementById('postSummary').value.trim();
        let content = document.getElementById('postBody').value.trim();
        if(!title || !content) { document.getElementById('editorError').innerText='标题和内容不能为空'; return; }
        document.getElementById('editorError').innerText='';
        let now = new Date().toLocaleDateString('zh-CN');
        
        let isNew = !editId;
        if(editId) {
            let idx = posts.findIndex(p=>p.id==editId);
            if(idx!==-1) posts[idx] = {...posts[idx], title, summary, content, date: now};
            editId=null;
        } else {
            posts.unshift({ id: Date.now().toString(), title, summary, content, date: now });
        }
        
        let success = await savePosts(true);
        renderBlogList();
        closeModal('editorModal');
        if(success) {
            if(isNew) showToast(`✅ 新文章「${title}」已发布并保存到云端！`);
            else showToast(`✅ 文章「${title}」已更新并同步到云端`);
        }
    }
    
    // ==================== UI 交互 ====================
    function openBilibiliDialog() { document.getElementById('bilibiliInput').value=''; document.getElementById('videoPreview').innerHTML='<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>'; document.getElementById('bilibiliDialog').style.display='flex'; }
    function previewVideo() { let input=document.getElementById('bilibiliInput').value; let bvid=extractBvid(input); let preview=document.getElementById('videoPreview'); if(bvid){ preview.innerHTML=generatePlayer(bvid); showToast(`预览: ${bvid}`); } else { preview.innerHTML='<p style="color:#c00;">❌ 无效的BV号</p>'; showToast('无效的BV号',true); } }
    function insertVideo() { let input=document.getElementById('bilibiliInput').value; let bvid=extractBvid(input); if(!bvid){ showToast('无效的BV号',true); return; } let ta=document.getElementById('postBody'); let ins=`@bilibili:${bvid}`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); closeModal('bilibiliDialog'); showToast('已插入视频'); }
    function insertImage() { let url=prompt('图片URL:'); if(url){ let ta=document.getElementById('postBody'); let ins=`![图片](${url})`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); } }
    function insertLink() { let text=prompt('链接文字:'); if(text){ let url=prompt('链接URL:'); if(url){ let ta=document.getElementById('postBody'); let ins=`[${text}](${url})`; let start=ta.selectionStart; ta.value=ta.value.substring(0,start)+ins+ta.value.substring(ta.selectionEnd); ta.focus(); } } }
    
    function openGithubConfig() { 
        document.getElementById('githubToken').value = githubConfig.token || '';
        document.getElementById('githubOwner').value = githubConfig.owner || '';
        document.getElementById('githubRepo').value = githubConfig.repo || '';
        document.getElementById('testResult').innerHTML = '';
        document.getElementById('debugLog').innerHTML = '';
        document.getElementById('debugLog').style.display = 'none';
        document.getElementById('githubConfigModal').style.display = 'flex';
    }
    
    async function saveGithubFromForm() { 
        let token = document.getElementById('githubToken').value.trim();
        let owner = document.getElementById('githubOwner').value.trim();
        let repo = document.getElementById('githubRepo').value.trim();
        if(!token || !owner || !repo) { showToast('请填写完整信息', true); return; }
        
        showToast('测试连接中...');
        let testResult = await testGithubConnection();
        if(!testResult) {
            showToast('连接测试失败，请检查配置', true);
            return;
        }
        
        // 获取分支
        let branch = 'main';
        try {
            let repoRes = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(repoRes.ok) {
                let data = await repoRes.json();
                branch = data.default_branch || 'main';
            }
        } catch(e) {}
        
        saveGithubConfig(token, owner, repo, branch);
        closeModal('githubConfigModal');
        showToast('配置已保存，正在同步...');
        await savePosts(true);
        await loadPosts();
    }
    
    function clearGithub() { 
        githubConfig = { token: '', owner: '', repo: '', branch: 'main' }; 
        localStorage.removeItem('github_blog_config'); 
        updateSyncStatus(); 
        showToast('已清除云端配置'); 
    }
    
    // ==================== 登录 ====================
    function login(remember) { 
        let u = document.getElementById('loginUser').value; 
        let p = document.getElementById('loginPass').value; 
        if(u === ADMIN_USERNAME && p === ADMIN_PASSWORD){ 
            isAdmin=true; 
            let exp = remember ? Date.now()+30*24*3600000 : Date.now()+24*3600000; 
            localStorage.setItem('blog_admin','true'); 
            localStorage.setItem('blog_admin_expiry',exp); 
            updateAdminUI(true); 
            closeModal('loginModal'); 
            showToast('登录成功'); 
        } else { 
            document.getElementById('loginError').innerHTML = '用户名或密码错误'; 
        } 
    }
    function logout() { isAdmin=false; localStorage.removeItem('blog_admin'); localStorage.removeItem('blog_admin_expiry'); updateAdminUI(false); renderBlogList(); showToast('已退出'); }
    function updateAdminUI(logged) { 
        let auth = document.getElementById('authSection'); 
        let admin = document.getElementById('adminTools'); 
        if(logged){ auth.style.display='none'; admin.style.display='flex'; }
        else{ auth.style.display='block'; admin.style.display='none'; }
    }
    function checkLogin() { 
        let exp = localStorage.getItem('blog_admin_expiry'); 
        if(localStorage.getItem('blog_admin')==='true' && exp && Date.now()<parseInt(exp)){ 
            isAdmin=true; updateAdminUI(true); 
        } 
    }
    
    // ==================== 初始化 ====================
    window.onload = async () => {
        loadGithubConfig();
        checkLogin();
        await loadPosts();
        
        document.getElementById('adminLoginBtn')?.addEventListener('click',()=>document.getElementById('loginModal').style.display='flex');
        document.getElementById('loginBtn')?.addEventListener('click',()=>login(false));
        document.getElementById('rememberLoginBtn')?.addEventListener('click',()=>login(true));
        document.getElementById('logoutBtn')?.addEventListener('click',logout);
        document.getElementById('newPostBtn')?.addEventListener('click',()=>{ editId=null; document.getElementById('postTitle').value=''; document.getElementById('postSummary').value=''; document.getElementById('postBody').value=''; document.getElementById('editorTitle').innerText='写新文章'; document.getElementById('editorModal').style.display='flex'; });
        document.getElementById('savePostBtn')?.addEventListener('click',saveCurrentPost);
        document.getElementById('homeLink')?.addEventListener('click',(e)=>{ e.preventDefault(); renderBlogList(); });
        document.querySelector('.logo')?.addEventListener('click',()=>renderBlogList());
        document.getElementById('configBtn')?.addEventListener('click',openGithubConfig);
        document.getElementById('saveGithubBtn')?.addEventListener('click',saveGithubFromForm);
        document.getElementById('clearGithubBtn')?.addEventListener('click',clearGithub);
        document.getElementById('testGithubBtn')?.addEventListener('click',testGithubConnection);
        document.getElementById('previewVideoBtn')?.addEventListener('click',previewVideo);
        document.getElementById('clearPreviewBtn')?.addEventListener('click',()=>{ document.getElementById('videoPreview').innerHTML='<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>'; });
        document.getElementById('insertVideoBtn')?.addEventListener('click',insertVideo);
        
        window.closeModal=closeModal;
        window.openBilibiliDialog=openBilibiliDialog;
        window.insertImage=insertImage;
        window.insertLink=insertLink;
        window.editPost=editPost;
        window.deletePost=deletePost;
    };
</script>
