<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简博客 · 毛玻璃风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle at 20% 30%, #e9ecef, #d4d9e2);
            min-height: 100vh;
            color: #1f1f1f;
        }
        .glass-panel { background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.6); }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
        .navbar { padding: 16px 0; position: sticky; top: 20px; z-index: 100; margin-bottom: 20px; }
        .nav-content { background: rgba(255,255,255,0.7); backdrop-filter: blur(24px); border-radius: 48px; padding: 8px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 600; 
            background: linear-gradient(135deg, #1e3a8a, #2c3e66); 
            background-clip: text; 
            -webkit-background-clip: text; 
            color: transparent; 
            cursor: pointer;
            user-select: none;
        }
        .logo:active { transform: scale(0.98); }
        .nav-links { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .nav-link { text-decoration: none; font-weight: 500; color: #2c2c2c; padding: 6px 14px; border-radius: 32px; transition: 0.2s; }
        .nav-link:hover { background: rgba(0,0,0,0.05); }
        .btn { background: rgba(255,255,255,0.85); border: 0.5px solid rgba(0,0,0,0.08); padding: 8px 20px; border-radius: 32px; font-weight: 500; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 0.85rem; }
        .btn-primary { background: #1e3a8a; color: white; border: none; }
        .btn-primary:hover { background: #2c4a9e; }
        .status-badge { background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; }
        .sync-status { background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
        .sync-status.syncing { background: #e0e7ff; color: #3730a3; animation: pulse 1s infinite; }
        .sync-status.error { background: #fee2e2; color: #dc2626; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; margin: 40px 0 60px; }
        .blog-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); border-radius: 24px; padding: 24px; transition: all 0.25s; border: 1px solid rgba(255,255,255,0.9); cursor: pointer; }
        .blog-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.85); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
        .blog-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .blog-meta { font-size: 0.75rem; color: #4a5568; margin-bottom: 16px; }
        .blog-excerpt { color: #2d3a4b; line-height: 1.45; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        #bilibiliDialog, #githubConfigModal { z-index: 1100; }
        .modal-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(32px); border-radius: 32px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; padding: 28px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.4rem; margin-bottom: 20px; }
        .close-btn { font-size: 28px; background: none; border: none; cursor: pointer; opacity: 0.7; }
        input, textarea { width: 100%; padding: 12px 18px; margin: 10px 0 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 28px; background: rgba(255,255,255,0.7); font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { outline: none; border-color: #1e3a8a; background: white; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); color: white; padding: 12px 24px; border-radius: 60px; font-size: 0.85rem; z-index: 1200; max-width: 400px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .article-content { line-height: 1.65; }
        .article-content img { max-width: 100%; border-radius: 20px; margin: 20px 0; }
        .bilibili-player-wrapper { margin: 30px 0; border-radius: 16px; overflow: hidden; background: #000; }
        .bilibili-player { position: relative; width: 100%; padding-bottom: 56.25%; }
        .bilibili-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .toolbar-mini { background: rgba(0,0,0,0.04); border-radius: 48px; padding: 8px 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .tool-btn { background: rgba(255,255,255,0.7); border: none; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; }
        .video-preview { margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: 16px; text-align: center; min-height: 280px; }
        .giscus-wrapper { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.08); }
        .config-info { background: #f0f9ff; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.8rem; }
        .admin-tools-bar { background: rgba(0,0,0,0.03); border-radius: 40px; padding: 8px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .edit-mode-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e3a8a;
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 100;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .edit-mode-badge:hover { background: #2c4a9e; transform: scale(1.02); }
        .article-actions { margin-top: 1rem; display: flex; gap: 0.8rem; justify-content: flex-end; flex-wrap: wrap; }
        .article-action-btn { background: rgba(240,234,226,0.85); backdrop-filter: blur(4px); border: none; padding: 6px 14px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; color: #5a3f28; transition: all 0.2s; }
        .article-action-btn:hover { transform: scale(0.98); background: #e4d9ce; }
        .article-action-btn.delete { background: rgba(241,222,214,0.85); color: #b55a3c; }
        .pinned-badge { display: inline-flex; align-items: center; gap: 0.2rem; background: #c7a66b; color: white; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 500; margin-left: 8px; }
        .read-more { display: inline-block; color: #c7a66b; font-size: 0.85rem; font-weight: 500; margin-top: 0.5rem; cursor: pointer; transition: all 0.2s; }
        .read-more:hover { color: #9b6f42; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }
        .loading-spinner {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            padding: 20px 40px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .loading-spinner i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (max-width: 720px) { .container { padding: 0 16px; } .nav-content { justify-content: center; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-content glass-panel">
        <div class="logo" id="secretLogo">✦ 极简日志</div>
        <div class="nav-links">
            <a href="#" id="homeLink" class="nav-link">首页</a>
            <button class="btn" id="syncFromGithubBtn"><i class="fas fa-download"></i> 同步云端</button>
            <span id="syncStatus" class="sync-status">📡 就绪</span>
            <div id="adminTools" style="display: none;">
                <div class="admin-tools-bar">

<main class="container"><div id="blogListContainer" class="blog-grid"></div></main>

<div id="loadingOverlay" class="loading-overlay">

<!-- GitHub 配置模态框 -->

<!-- B站视频插入对话框 -->
<div id="bilibiliDialog" class="modal">

<!-- 文章编辑窗 -->
<div id="editorModal" class="modal">

<!-- 文章详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-card" style="max-width: 980px;">
        <div class="modal-header"><span id="detailTitle"></span><button class="close-btn" onclick="closeModal('detailModal')">&times;</button></div>
        <div id="detailContent" class="article-content"></div>
        <div id="detailAdminActions" style="margin-top:20px;"></div>
        <div id="giscusContainer" class="giscus-wrapper"></div>
    </div>
</div>

<script>
    // ==================== GitHub 配置 ====================
    let githubConfig = {
        owner: 'tianlu464',
        repo: 'blog',
        token: ''
    };
    const STORAGE_FILE = 'data.json';
    const ADMIN_PASSWORD = "bixie4.5";
    const TOKEN_STORAGE_KEY = 'github_blog_config';
    
    // Giscus 配置
    const GISCUS_CONFIG = {
        repo: 'Astroptis/blog',
        repoId: 'R_kgDORzSJcQ',
        category: 'Announcements',
        categoryId: 'DIC_kwDORzSJcc4C5hnP'
    };
    
    let editMode = false;
    let posts = [];
    let editId = null;
    let clickCount = 0;
    let clickTimer = null;
    let currentView = 'list';
    let currentPostId = null;
    
    // ==================== 工具函数 ====================
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function showToast(msg, isErr=false, duration=4000) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = msg;
        t.style.background = isErr ? '#c62828' : 'rgba(0,0,0,0.85)';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), duration);
    }
    
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function showLoading(show) {
        const overlay = document.getElementById('loadingOverlay');
        if(overlay) overlay.style.display = show ? 'flex' : 'none';
    }
    
    function updateSyncStatus(status, message) {
        let indicator = document.getElementById('syncStatus');
        if(!indicator) return;
        if(status === 'syncing') {
            indicator.className = 'sync-status syncing';
            indicator.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message || '同步中...'}`;
        } else if(status === 'error') {
            indicator.className = 'sync-status error';
            indicator.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message || '同步失败'}`;
        } else {
            indicator.className = 'sync-status';
            indicator.innerHTML = `<i class="fas fa-check-circle"></i> ${message || '就绪'}`;
        }
    }
    
    function extractBvid(input) { if(!input) return null; let m = input.match(/BV[a-zA-Z0-9]{10}/); return m ? m[0] : null; }
    
    function generatePlayer(bvid) {
        return `<div class="bilibili-player-wrapper"><div class="bilibili-player"><iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&page=1&high_quality=1" allowfullscreen></iframe></div></div>`;
    }
    
    function renderMarkdown(text) {
        if(!text) return '';
        let html = text;
        html = html.replace(/@bilibili:([A-Za-z0-9]+)/gi, (m,b)=>generatePlayer(b));
        html = html.replace(/^(BV[0-9A-Za-z]{10})$/gm, (m,b)=>generatePlayer(b));
        html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:100%; border-radius:16px;">');
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
        return html;
    }
    
    // ==================== 配置管理 ====================
    function loadGithubConfig() {
        try {
            const saved = localStorage.getItem(TOKEN_STORAGE_KEY);
            if (saved) {
                const config = JSON.parse(saved);
                githubConfig = {
                    owner: config.owner || 'tianlu464',
                    repo: config.repo || 'blog',
                    token: config.token || ''
                };
            }
        } catch(e) {}
    }
    
    function saveGithubConfig(owner, repo, token) {
        githubConfig = { owner, repo, token };
        localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify(githubConfig));
        showToast('配置已保存');
    }
    
    function clearGithubConfig() {
        githubConfig = { owner: 'tianlu464', repo: 'blog', token: '' };
        localStorage.removeItem(TOKEN_STORAGE_KEY);
        showToast('已清除配置');
    }
    
    // ==================== GitHub API 函数 ====================
    function base64Decode(str) {
        try { return decodeURIComponent(escape(atob(str))); } catch (e) { return atob(str); }
    }
    
    async function getFileSha() {
        if (!githubConfig.owner || !githubConfig.repo) return null;
        const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${STORAGE_FILE}`;
        const res = await fetch(url);
        if (res.status === 404) return null;
        if (!res.ok) throw new Error(`获取文件失败: ${res.status}`);
        const data = await res.json();
        return { sha: data.sha, content: data.content };
    }
    
    // 从 GitHub 加载文章（直接读取 articles 数组）
    async function loadFromGitHub() {
        if (!githubConfig.owner || !githubConfig.repo) return false;
        
        try {
            const file = await getFileSha();
            if (file && file.content) {
                const decoded = base64Decode(file.content);
                console.log('解码后的JSON:', decoded);
                const json = JSON.parse(decoded);
                console.log('解析后的对象:', json);
                
                // 直接从 json.articles 获取文章数组
                if (json.articles && Array.isArray(json.articles)) {
                    posts = json.articles;
                    console.log('✅ 成功加载文章，共', posts.length, '篇');
                    localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
                    return true;
                } else if (Array.isArray(json)) {
                    // 兼容旧格式：直接是数组
                    posts = json;
                    console.log('✅ 成功加载文章（数组格式），共', posts.length, '篇');
                    localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
                    return true;
                } else {
                    console.log('❌ 无法识别的数据格式');
                    return false;
                }
            } else {
                console.log('文件不存在');
                return false;
            }
        } catch (err) {
            console.error('GitHub加载失败:', err);
            return false;
        }
    }
    
    async function saveToGitHub() {
        if (!editMode) {
            showToast('只有管理员可以保存到云端', true);
            return false;
        }
        if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
            showToast('请先在「云端配置」中填写 GitHub 信息', true);
            return false;
        }
        
        try {
            showLoading(true);
            // 保存为标准格式 { articles: [...] }
            const dataToSave = { articles: posts };
            const jsonStr = JSON.stringify(dataToSave, null, 2);
            console.log('保存的数据:', jsonStr);
            const content = btoa(unescape(encodeURIComponent(jsonStr)));
            let sha = null;
            try {
                const file = await getFileSha();
                if (file) sha = file.sha;
            } catch (e) { }
            
            const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${STORAGE_FILE}`;
            const body = { 
                message: `更新博客数据 ${new Date().toLocaleString()} - ${posts.length}篇文章`, 
                content: content, 
                branch: 'main' 
            };
            if (sha) body.sha = sha;
            
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${githubConfig.token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(body)
            });
            
            if (res.status === 401) {
                throw new Error("Token 无效或已过期，请重新配置");
            }
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || `HTTP ${res.status}`);
            }
            
            showToast('✅ 已成功保存到 GitHub 云端！', false);
            updateSyncStatus('success', '已保存');
            return true;
        } catch(err) {
            console.error('保存失败:', err);
            showToast(`❌ 保存失败: ${err.message}`, true);
            return false;
        } finally {
            showLoading(false);
        }
    }
    
    async function syncFromCloud(showLoadingIndicator = true) {
        if (showLoadingIndicator) showLoading(true);
        updateSyncStatus('syncing', '同步中...');
        
        try {
            const success = await loadFromGitHub();
            if (success && posts.length > 0) {
                renderBlogList();
                updateSyncStatus('success', `已同步 ${posts.length} 篇文章`);
                if (showLoadingIndicator) showToast(`✅ 同步成功！共 ${posts.length} 篇文章`, false);
            } else {
                // 从本地缓存加载
                let cached = localStorage.getItem('blog_posts_cache');
                if (cached) {
                    try {
                        posts = JSON.parse(cached);
                        if (posts && posts.length > 0) {
                            renderBlogList();
                            updateSyncStatus('error', '使用本地缓存');
                            if (showLoadingIndicator) showToast(`⚠️ 云端无数据，已加载本地缓存 (${posts.length}篇)`, true);
                        } else {
                            posts = [];
                            renderBlogList();
                            updateSyncStatus('error', '暂无数据');
                            if (showLoadingIndicator) showToast('⚠️ 暂无文章', true);
                        }
                    } catch(e) {
                        posts = [];
                        renderBlogList();
                        updateSyncStatus('error', '缓存读取失败');
                    }
                } else {
                    posts = [];
                    renderBlogList();
                    updateSyncStatus('error', '暂无数据');
                    if (showLoadingIndicator) showToast('⚠️ 暂无文章，请管理员发布', true);
                }
            }
        } catch(e) {
            console.error('同步失败:', e);
            let cached = localStorage.getItem('blog_posts_cache');
            if (cached) {
                try {
                    posts = JSON.parse(cached);
                    renderBlogList();
                } catch(e) {}
            }
            updateSyncStatus('error', '同步失败');
            if (showLoadingIndicator) showToast(`❌ 同步失败: ${e.message}`, true);
        } finally {
            if (showLoadingIndicator) showLoading(false);
        }
    }
    
    async function savePosts() {
        localStorage.setItem('blog_posts_cache', JSON.stringify(posts));
        
        if (editMode && githubConfig.token && githubConfig.owner && githubConfig.repo) {
            return await saveToGitHub();
        } else if (editMode && (!githubConfig.token || !githubConfig.owner || !githubConfig.repo)) {
            showToast('未配置 GitHub，文章仅保存到本地', true);
            return false;
        }
        return false;
    }
    
    // ==================== 文章操作 ====================
    function addArticle() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        editId = null;
        document.getElementById('postTitle').value = '';
        document.getElementById('postSummary').value = '';
        document.getElementById('postBody').value = '';
        document.getElementById('editorTitle').innerText = '写新文章';
        document.getElementById('editorModal').style.display = 'flex';
    }
    
    function editArticle(id) {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        const post = posts.find(p => p.id == id);
        if (post) {
            editId = id;
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postSummary').value = post.summary || '';
            document.getElementById('postBody').value = post.content;
            document.getElementById('editorTitle').innerText = '编辑文章';
            document.getElementById('editorModal').style.display = 'flex';
        }
    }
    
    async function deleteArticle(id) {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        if (!confirm('⚠️ 确定删除这篇文章吗？')) return;
        const postTitle = posts.find(p => p.id == id)?.title || '';
        posts = posts.filter(p => p.id != id);
        await savePosts();
        renderBlogList();
        if (currentView === 'detail') {
            currentView = 'list';
            renderBlogList();
        }
        showToast(`✅ 文章「${postTitle}」已删除`);
    }
    
    async function saveCurrentPost() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        let title = document.getElementById('postTitle').value.trim();
        let summary = document.getElementById('postSummary').value.trim();
        let content = document.getElementById('postBody').value.trim();
        if (!title || !content) {
            document.getElementById('editorError').innerText = '标题和内容不能为空';
            return;
        }
        document.getElementById('editorError').innerText = '';
        let now = new Date().toLocaleDateString('zh-CN');
        
        let isNew = !editId;
        if (editId) {
            let idx = posts.findIndex(p => p.id == editId);
            if (idx !== -1) posts[idx] = { ...posts[idx], title, summary, content, date: now };
            editId = null;
        } else {
            posts.unshift({ id: Date.now().toString(), title, summary, content, date: now, pinned: false });
        }
        
        await savePosts();
        renderBlogList();
        closeModal('editorModal');
        if (isNew) showToast(`✅ 新文章「${title}」已发布`);
        else showToast(`✅ 文章「${title}」已更新`);
    }
    
    function togglePinArticle(id) {
        const article = posts.find(a => a.id === id);
        if (article) {
            article.pinned = !article.pinned;
            savePosts();
            renderBlogList();
            showToast(article.pinned ? "📌 文章已置顶" : "📍 文章已取消置顶", false);
        }
    }
    
    // ==================== UI 渲染 ====================
    function renderBlogList() {
        const container = document.getElementById('blogListContainer');
        if (!container) return;
        
        const sorted = [...posts].sort((a, b) => {
            if (a.pinned === b.pinned) return new Date(b.date) - new Date(a.date);
            return a.pinned ? -1 : 1;
        });
        
        if (sorted.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:60px;">✨ 暂无文章，管理员可点击「写文章」开始创作</div>';
            return;
        }
        
        container.innerHTML = sorted.map(p => `
            <div class="blog-card" data-id="${p.id}">
                <div class="blog-title">${escapeHtml(p.title)}${p.pinned ? '<span class="pinned-badge">📌 置顶</span>' : ''}</div>
                <div class="blog-meta"><i class="far fa-calendar-alt"></i> ${p.date || '未知'}</div>
                <div class="blog-excerpt">${escapeHtml(p.summary || (p.content || '').substring(0, 100))}...</div>
                <div class="read-more" data-id="${p.id}">📖 阅读全文 →</div>
                ${editMode ? `
                    <div class="article-actions">
                        <button class="article-action-btn edit-article" data-id="${p.id}">✏️ 编辑</button>
                        <button class="article-action-btn ${p.pinned ? 'unpin' : 'pin'}" data-id="${p.id}">${p.pinned ? '📍 取消置顶' : '📌 置顶'}</button>
                        <button class="article-action-btn delete" data-id="${p.id}">🗑️ 删除</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
        
        // 绑定事件
        document.querySelectorAll('.read-more').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = el.getAttribute('data-id');
                showArticleDetail(id);
            });
        });
        document.querySelectorAll('.blog-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('read-more') || e.target.classList.contains('article-action-btn')) return;
                const id = card.getAttribute('data-id');
                showArticleDetail(id);
            });
        });
        
        if (editMode) {
            document.querySelectorAll('.edit-article').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editArticle(btn.getAttribute('data-id'));
                });
            });
            document.querySelectorAll('.pin, .unpin').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    togglePinArticle(btn.getAttribute('data-id'));
                });
            });
            document.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteArticle(btn.getAttribute('data-id'));
                });
            });
        }
    }
    
    async function showArticleDetail(id) {
        const post = posts.find(p => p.id == id);
        if (!post) return;
        currentPostId = id;
        currentView = 'detail';
        
        document.getElementById('detailTitle').innerText = post.title;
        document.getElementById('detailContent').innerHTML = renderMarkdown(post.content);
        
        const adminDiv = document.getElementById('detailAdminActions');
        if (editMode) {
            adminDiv.innerHTML = `
                <button class="btn" onclick="editArticle('${post.id}')">✏️ 编辑</button>
                <button class="btn" onclick="togglePinArticle('${post.id}')">${post.pinned ? '📍 取消置顶' : '📌 置顶'}</button>
                <button class="btn" onclick="deleteArticle('${post.id}')">🗑️ 删除</button>
            `;
        } else {
            adminDiv.innerHTML = '';
        }
        
        document.getElementById('detailModal').style.display = 'flex';
        
        // 加载 Giscus 评论
        const giscusContainer = document.getElementById('giscusContainer');
        if (giscusContainer) {
            giscusContainer.innerHTML = '';
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            script.setAttribute('data-repo', GISCUS_CONFIG.repo);
            script.setAttribute('data-repo-id', GISCUS_CONFIG.repoId);
            script.setAttribute('data-category', GISCUS_CONFIG.category);
            script.setAttribute('data-category-id', GISCUS_CONFIG.categoryId);
            script.setAttribute('data-mapping', 'specific');
            script.setAttribute('data-term', `/article/${post.id}`);
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'light');
            script.setAttribute('data-lang', 'zh-CN');
            script.setAttribute('crossorigin', 'anonymous');
            script.async = true;
            giscusContainer.appendChild(script);
        }
    }
    
    // ==================== 配置对话框 ====================
    async function testConnection() {
        const token = document.getElementById('githubToken').value.trim();
        const owner = document.getElementById('githubOwner').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        const resultDiv = document.getElementById('configResult');
        
        if (!token || !owner || !repo) {
            resultDiv.innerHTML = '❌ 请填写完整信息';
            resultDiv.style.color = '#dc2626';
            return;
        }
        
        resultDiv.innerHTML = '🔄 测试中...';
        resultDiv.style.color = '#3730a3';
        
        try {
            const repoRes = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (repoRes.status === 401) {
                resultDiv.innerHTML = '❌ Token 无效，请检查权限（需要 repo 权限）';
                resultDiv.style.color = '#dc2626';
                return;
            }
            if (repoRes.status === 404) {
                resultDiv.innerHTML = `❌ 仓库 ${owner}/${repo} 不存在`;
                resultDiv.style.color = '#dc2626';
                return;
            }
            if (!repoRes.ok) {
                resultDiv.innerHTML = `❌ 仓库访问失败: HTTP ${repoRes.status}`;
                resultDiv.style.color = '#dc2626';
                return;
            }
            
            resultDiv.innerHTML = '✅ 连接成功！可以保存配置';
            resultDiv.style.color = '#10b981';
        } catch(e) {
            resultDiv.innerHTML = `❌ 网络错误: ${e.message}`;
            resultDiv.style.color = '#dc2626';
        }
    }
    
    function saveConfigFromForm() {
        const token = document.getElementById('githubToken').value.trim();
        const owner = document.getElementById('githubOwner').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        
        if (!token || !owner || !repo) {
            showToast('请填写完整信息', true);
            return;
        }
        
        saveGithubConfig(owner, repo, token);
        closeModal('githubConfigModal');
        showToast('配置已保存');
        syncFromCloud(true);
    }
    
    function openConfigModal() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        document.getElementById('githubToken').value = githubConfig.token || '';
        document.getElementById('githubOwner').value = githubConfig.owner || 'tianlu464';
        document.getElementById('githubRepo').value = githubConfig.repo || 'blog';
        document.getElementById('configResult').innerHTML = '';
        document.getElementById('githubConfigModal').style.display = 'flex';
    }
    
    // ==================== 管理员入口 ====================
    function initSecretAdmin() {
        const logo = document.getElementById('secretLogo');
        if (!logo) return;
        
        logo.addEventListener('click', () => {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            if (clickCount === 5) {
                clickCount = 0;
                const password = prompt('🔐 管理员验证\n\n请输入管理员密码：');
                if (password === ADMIN_PASSWORD) {
                    enableEditMode();
                } else if (password !== null) {
                    showToast('❌ 密码错误', true);
                }
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });
    }
    
    function enableEditMode() {
        editMode = true;
        renderBlogList();
        document.getElementById('adminTools').style.display = 'block';
        showToast('✅ 管理员模式已启用', false);
        
        const badge = document.createElement('div');
        badge.id = 'editModeBadge';
        badge.className = 'edit-mode-badge';
        badge.textContent = '✏️ 编辑模式 (点击退出)';
        badge.onclick = disableEditMode;
        document.body.appendChild(badge);
    }
    
    function disableEditMode() {
        editMode = false;
        renderBlogList();
        document.getElementById('adminTools').style.display = 'none';
        document.getElementById('editModeBadge')?.remove();
        showToast('🔒 已退出编辑模式');
    }
    
    function logout() {
        disableEditMode();
    }
    
    // ==================== UI 交互 ====================
    function openBilibiliDialog() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        document.getElementById('bilibiliInput').value = '';
        document.getElementById('videoPreview').innerHTML = '<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>';
        document.getElementById('bilibiliDialog').style.display = 'flex';
    }
    
    function previewVideo() {
        let input = document.getElementById('bilibiliInput').value;
        let bvid = extractBvid(input);
        let preview = document.getElementById('videoPreview');
        if (bvid) {
            preview.innerHTML = generatePlayer(bvid);
            showToast(`预览: ${bvid}`);
        } else {
            preview.innerHTML = '<p style="color:#c00;">❌ 无效的BV号</p>';
            showToast('无效的BV号', true);
        }
    }
    
    function insertVideo() {
        let input = document.getElementById('bilibiliInput').value;
        let bvid = extractBvid(input);
        if (!bvid) { showToast('无效的BV号', true); return; }
        let ta = document.getElementById('postBody');
        let ins = `@bilibili:${bvid}`;
        let start = ta.selectionStart;
        ta.value = ta.value.substring(0, start) + ins + ta.value.substring(ta.selectionEnd);
        ta.focus();
        closeModal('bilibiliDialog');
        showToast('已插入视频');
    }
    
    function insertImage() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        let url = prompt('图片URL:');
        if (url) {
            let ta = document.getElementById('postBody');
            let ins = `![图片](${url})`;
            let start = ta.selectionStart;
            ta.value = ta.value.substring(0, start) + ins + ta.value.substring(ta.selectionEnd);
            ta.focus();
        }
    }
    
    function insertLink() {
        if (!editMode) { showToast('请先进入管理员模式', true); return; }
        let text = prompt('链接文字:');
        if (text) {
            let url = prompt('链接URL:');
            if (url) {
                let ta = document.getElementById('postBody');
                let ins = `[${text}](${url})`;
                let start = ta.selectionStart;
                ta.value = ta.value.substring(0, start) + ins + ta.value.substring(ta.selectionEnd);
                ta.focus();
            }
        }
    }
    
    // ==================== 初始化 ====================
    async function init() {
        loadGithubConfig();
        await syncFromCloud(false);
        initSecretAdmin();
        
        document.getElementById('homeLink')?.addEventListener('click', (e) => { e.preventDefault(); renderBlogList(); currentView = 'list'; });
        document.getElementById('syncFromGithubBtn')?.addEventListener('click', () => syncFromCloud(true));
        document.getElementById('newPostBtn')?.addEventListener('click', addArticle);
        document.getElementById('savePostBtn')?.addEventListener('click', saveCurrentPost);
        document.getElementById('configBtn')?.addEventListener('click', openConfigModal);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('saveConfigBtn')?.addEventListener('click', saveConfigFromForm);
        document.getElementById('clearConfigBtn')?.addEventListener('click', () => {
            clearGithubConfig();
            closeModal('githubConfigModal');
        });
        document.getElementById('testConnectionBtn')?.addEventListener('click', testConnection);
        document.getElementById('previewVideoBtn')?.addEventListener('click', previewVideo);
        document.getElementById('clearPreviewBtn')?.addEventListener('click', () => {
            document.getElementById('videoPreview').innerHTML = '<i class="fas fa-video" style="font-size:48px;opacity:0.3;"></i><p>点击预览查看视频</p>';
        });
        document.getElementById('insertVideoBtn')?.addEventListener('click', insertVideo);
        
        window.closeModal = closeModal;
        window.openBilibiliDialog = openBilibiliDialog;
        window.insertImage = insertImage;
        window.insertLink = insertLink;
        window.editArticle = editArticle;
        window.deleteArticle = deleteArticle;
        window.togglePinArticle = togglePinArticle;
    }
    
    init();
</script>
