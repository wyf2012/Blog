<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简博客 | GitHub JSON存储版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 样式保持不变，省略重复代码以节省篇幅... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --acrylic-bg: rgba(255, 255, 255, 0.65);
            --acrylic-border: rgba(255, 255, 255, 0.5);
            --acrylic-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --accent-color: #0078d4;
            --accent-hover: #106ebe;
            --text-primary: #1f1f1f;
            --text-secondary: #5f5f5f;
            --mica-bg: #f3f3f3;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --acrylic-bg: rgba(40, 40, 40, 0.75);
                --acrylic-border: rgba(255, 255, 255, 0.1);
                --acrylic-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                --text-primary: #ffffff;
                --text-secondary: #cccccc;
                --mica-bg: #202020;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 10% 20%, #e0e7ff 0%, transparent 50%),
                        radial-gradient(ellipse at 90% 80%, #fce7f3 0%, transparent 50%),
                        var(--mica-bg);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: radial-gradient(ellipse at 10% 20%, #1e3a8a 0%, transparent 50%),
                            radial-gradient(ellipse at 90% 80%, #831843 0%, transparent 50%),
                            var(--mica-bg);
            }
        }

        .acrylic {
            background: var(--acrylic-bg);
            backdrop-filter: blur(20px) saturate(125%);
            -webkit-backdrop-filter: blur(20px) saturate(125%);
            border: 1px solid var(--acrylic-border);
            box-shadow: var(--acrylic-shadow);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 1150px;
            z-index: 1000;
            border-radius: 16px;
            padding: 12px 24px;
            transition: var(--transition-smooth);
            animation: slideDown 0.6s var(--transition-spring);
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-color), #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: var(--transition-fast);
            user-select: none;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-btn.primary {
            background: var(--accent-color);
            color: white;
        }

        .nav-btn.primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .refresh-btn {
            background: var(--accent-color);
            color: white;
        }

        .refresh-btn:hover {
            background: var(--accent-hover);
        }

        main {
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .profile-section {
            margin-bottom: 48px;
            animation: fadeInUp 0.8s var(--transition-spring) 0.1s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-card {
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #00b4d8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 8px 24px rgba(0, 120, 212, 0.3);
            transition: var(--transition-spring);
            flex-shrink: 0;
        }

        .avatar:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .profile-info h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .profile-bio {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 600px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .stat {
            text-align: center;
            transition: var(--transition-fast);
        }

        .stat:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .edit-profile-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-10px);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-card:hover .edit-profile-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .setup-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            animation: fadeInUp 0.6s var(--transition-spring) both;
        }

        .setup-banner-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .setup-banner-icon {
            font-size: 2rem;
            opacity: 0.9;
        }

        .setup-banner-text h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .setup-banner-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
            white-space: nowrap;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: fadeInUp 0.6s var(--transition-spring) 0.2s both;
        }

        .refresh-indicator {
            font-size: 0.85rem;
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .refresh-indicator i {
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .refresh-indicator i:hover {
            color: var(--accent-color);
            transform: rotate(180deg);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            animation: fadeInUp 0.6s var(--transition-spring) 0.3s both;
        }

        .blog-card {
            border-radius: 20px;
            padding: 28px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .blog-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .blog-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.15);
        }

        .blog-card:hover::before {
            opacity: 1;
        }

        .blog-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .blog-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .blog-excerpt {
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-more {
            margin-top: 16px;
            color: var(--accent-color);
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition-fast);
        }

        .blog-card:hover .read-more {
            gap: 8px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--acrylic-bg);
            backdrop-filter: blur(40px) saturate(150%);
            border-radius: 24px;
            border: 1px solid var(--acrylic-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s var(--transition-spring);
            padding: 32px;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-btn {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-primary);
            transition: var(--transition-fast);
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
        }

        .form-textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tool-btn {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }

        .tool-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
            flex: 1;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .article-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .article-content img {
            max-width: 100%;
            border-radius: 16px;
            margin: 24px 0;
        }

        .bilibili-wrapper {
            margin: 24px 0;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .bilibili-player {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .bilibili-player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .giscus-container {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--acrylic-bg);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid var(--acrylic-border);
            box-shadow: var(--acrylic-shadow);
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s var(--transition-spring);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left: 4px solid #dc3545;
        }

        .toast.success {
            border-left: 4px solid #28a745;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .github-config {
            background: rgba(0, 120, 212, 0.05);
            border: 1px solid rgba(0, 120, 212, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .config-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.05);
            margin-top: 8px;
        }

        .config-status.connected {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .config-status.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 768px) {
            .navbar {
                width: calc(100% - 32px);
                top: 12px;
                padding: 10px 16px;
            }
            .nav-links { gap: 4px; }
            .nav-btn span { display: none; }
            main { padding-top: 90px; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
            .blog-grid { grid-template-columns: 1fr; }
            .modal { width: 95%; padding: 24px; }
            .edit-profile-btn {
                position: static;
                margin-top: 16px;
                opacity: 1;
                transform: none;
            }
            .setup-banner { flex-direction: column; text-align: center; }
            .section-title { flex-direction: column; align-items: flex-start; }
        }

        .sync-indicator {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--acrylic-bg);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--acrylic-border);
            z-index: 2500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition-fast);
        }

        .sync-indicator.hidden {
            transform: translateY(100px);
            opacity: 0;
        }

        .sync-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
        }

        .sync-status.syncing { background: #ffc107; animation: pulse 1s infinite; }
        .sync-status.error { background: #dc3545; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .mode-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-fast);
            color: var(--text-secondary);
        }

        .mode-btn.active {
            background: white;
            color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .info-box {
            background: rgba(0, 120, 212, 0.08);
            border-left: 4px solid var(--accent-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .json-area {
            width: 100%;
            min-height: 150px;
            font-family: monospace;
            font-size: 0.85rem;
            padding: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            resize: vertical;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <nav class="navbar acrylic">
        <div class="nav-content">
            <div class="logo" onclick="app.goHome()">
                <i class="fas fa-feather-alt"></i> 极简博客
            </div>
            <div class="nav-links">
                <button class="nav-btn" onclick="app.goHome()">
                    <i class="fas fa-home"></i> <span>首页</span>
                </button>
                <button class="nav-btn refresh-btn" onclick="app.refreshFromGitHub()">
                    <i class="fas fa-sync-alt"></i> <span>刷新</span>
                </button>
                <div id="guestActions">
                    <button class="nav-btn primary" onclick="app.showLogin()">
                        <i class="fas fa-lock"></i> <span>管理登录</span>
                    </button>
                </div>
                <div id="adminActions" style="display: none;">
                    <button class="nav-btn primary" onclick="app.openEditor()">
                        <i class="fas fa-plus"></i> <span>写文章</span>
                    </button>
                    <button class="nav-btn" onclick="app.showDataManager()">
                        <i class="fas fa-cloud-upload-alt"></i> <span>同步设置</span>
                    </button>
                    <button class="nav-btn" onclick="app.logout()">
                        <i class="fas fa-sign-out-alt"></i> <span>退出</span>
                    </button>
                    <span class="admin-badge">

    <script>
        const GISCUS_BASE_CONFIG = {
            src: 'https://giscus.app/client.js',
            'data-repo': 'wyf2012/Blog',
            'data-repo-id': 'R_kgDORzrk5w',
            'data-category': 'Announcements',
            'data-category-id': 'DIC_kwDORzrk584C5jXz',
            'data-mapping': 'specific',
            'data-strict': '0',
            'data-reactions-enabled': '1',
            'data-emit-metadata': '0',
            'data-input-position': 'bottom',
            'data-theme': 'preferred_color_scheme',
            'data-lang': 'zh-CN',
            crossorigin: 'anonymous',
            async: true
        };

        const app = {
            posts: [],
            isAdmin: false,
            editingPostId: null,
            githubConfig: null,
            postsSha: null,
            storageMode: 'github',
            profile: { name: '极简博主', avatar: '✨', bio: '欢迎来到我的博客！' },
            currentPostId: null,
            lastSyncTime: null,

            init() {
                this.loadProfile();
                this.loadGitHubConfig();
                this.loadPosts();
                this.checkAuth();
                this.render();
                this.startAutoSync();
                this.updateLastSyncTimeDisplay();
            },

            startAutoSync() {
                // 每5分钟自动同步一次
                setInterval(() => {
                    if (this.githubConfig) {
                        this.loadFromGitHub(true);
                    }
                }, 300000);
            },

            updateLastSyncTimeDisplay() {
                const timeSpan = document.getElementById('lastSyncTime');
                if (this.lastSyncTime) {
                    const date = new Date(this.lastSyncTime);
                    timeSpan.textContent = `上次同步: ${date.toLocaleTimeString()}`;
                } else {
                    timeSpan.textContent = '未同步';
                }
            },

            async refreshFromGitHub() {
                if (!this.githubConfig) {
                    this.showToast('请先配置 GitHub 仓库信息', 'warning');
                    this.showSetupWizard();
                    return;
                }
                await this.loadFromGitHub(false);
            },

            loadGitHubConfig() {
                const config = localStorage.getItem('github_config');
                if (config) {
                    try {
                        this.githubConfig = JSON.parse(config);
                    } catch(e) {}
                }
            },

            saveGitHubConfig() {
                const owner = document.getElementById('githubOwner').value.trim();
                const repo = document.getElementById('githubRepo').value.trim();
                const branch = document.getElementById('githubBranch').value.trim() || 'main';
                const token = document.getElementById('githubToken').value.trim();
                if (!owner || !repo) {
                    this.showToast('请填写仓库信息', 'error');
                    return;
                }
                this.githubConfig = { owner, repo, branch, token: token || null };
                localStorage.setItem('github_config', JSON.stringify(this.githubConfig));
                this.showToast('GitHub 配置已保存');
                document.getElementById('setupBanner').style.display = 'none';
                this.loadFromGitHub(false);
            },

            async testPublicRepo() {
                const owner = document.getElementById('githubOwner').value.trim() || this.githubConfig?.owner;
                const repo = document.getElementById('githubRepo').value.trim() || this.githubConfig?.repo;
                const statusDiv = document.getElementById('githubConfigStatus') || document.getElementById('setupStatus');
                if (!owner || !repo) {
                    statusDiv.style.display = 'inline-flex';
                    statusDiv.className = 'config-status error';
                    statusDiv.innerHTML = '请填写仓库信息';
                    return;
                }
                statusDiv.style.display = 'inline-flex';
                statusDiv.className = 'config-status';
                statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检查中...';
                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/posts.json`);
                    if (res.ok) {
                        statusDiv.className = 'config-status connected';
                        statusDiv.innerHTML = '✅ 仓库公开可访问';
                    } else if (res.status === 404) {
                        statusDiv.className = 'config-status warning';
                        statusDiv.innerHTML = '⚠️ 仓库存在，但未找到 data/posts.json 文件';
                    } else {
                        statusDiv.className = 'config-status error';
                        statusDiv.innerHTML = '❌ 仓库不存在或不可访问';
                    }
                } catch(e) {
                    statusDiv.className = 'config-status error';
                    statusDiv.innerHTML = '❌ 网络错误';
                }
            },

            saveSetupConfig() {
                const owner = document.getElementById('setupOwner').value.trim();
                const repo = document.getElementById('setupRepo').value.trim();
                const branch = document.getElementById('setupBranch').value.trim() || 'main';
                const token = document.getElementById('setupToken').value.trim();
                if (!owner || !repo) {
                    this.showToast('请填写仓库信息', 'error');
                    return;
                }
                this.githubConfig = { owner, repo, branch, token: token || null };
                localStorage.setItem('github_config', JSON.stringify(this.githubConfig));
                document.getElementById('githubOwner').value = owner;
                document.getElementById('githubRepo').value = repo;
                document.getElementById('githubBranch').value = branch;
                if (token) document.getElementById('githubToken').value = token;
                this.closeModal('setupModal');
                this.showToast('配置已保存');
                document.getElementById('setupBanner').style.display = 'none';
                this.loadFromGitHub(false);
            },

            showSetupWizard() {
                this.showModal('setupModal');
            },

            utf8ToBase64(str) {
                const bytes = new TextEncoder().encode(str);
                const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
                return btoa(binary);
            },

            base64ToUtf8(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            },

            async loadFromGitHub(silent = false) {
                if (!this.githubConfig) return;
                const { owner, repo, branch } = this.githubConfig;
                
                if (!silent) {
                    this.showSyncStatus('正在从 GitHub 加载...', 'syncing');
                }
                
                try {
                    // 公开仓库不需要 token，直接访问
                    const url = `https://api.github.com/repos/${owner}/${repo}/contents/data/posts.json?ref=${branch}`;
                    const res = await fetch(url);
                    
                    if (res.status === 404) {
                        if (!silent) this.showToast('GitHub 上暂无数据文件', 'warning');
                        this.showSyncStatus('暂无数据', 'local');
                        return;
                    }
                    
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    
                    const data = await res.json();
                    const content = this.base64ToUtf8(data.content);
                    const remotePosts = JSON.parse(content);
                    
                    if (JSON.stringify(this.posts) !== JSON.stringify(remotePosts)) {
                        this.posts = remotePosts;
                        this.postsSha = data.sha;
                        this.savePostsToLocal();
                        this.render();
                        if (!silent) this.showToast('已从 GitHub 加载最新文章', 'success');
                    } else if (!silent) {
                        this.showToast('文章已是最新', 'success');
                    }
                    
                    this.lastSyncTime = Date.now();
                    this.updateLastSyncTimeDisplay();
                    this.showSyncStatus('已同步', 'success');
                    
                } catch (error) {
                    console.error('Failed to load from GitHub:', error);
                    if (!silent) this.showToast('从 GitHub 加载失败，使用本地缓存', 'error');
                    this.showSyncStatus('同步失败', 'error');
                }
            },

            async pushToGitHub() {
                if (!this.githubConfig) {
                    this.showToast('请先配置 GitHub', 'error');
                    return false;
                }
                if (!this.githubConfig.token) {
                    this.showToast('需要配置 Token 才能推送', 'error');
                    return false;
                }
                
                const { owner, repo, branch, token } = this.githubConfig;
                const content = this.utf8ToBase64(JSON.stringify(this.posts, null, 2));
                const path = 'data/posts.json';
                const body = { message: `Update ${new Date().toISOString()}`, content, branch };
                if (this.postsSha) body.sha = this.postsSha;
                
                this.showSyncStatus('正在推送到 GitHub...', 'syncing');
                
                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const result = await res.json();
                        this.postsSha = result.content.sha;
                        this.showToast('已同步到 GitHub', 'success');
                        this.showSyncStatus('已同步', 'success');
                        return true;
                    } else {
                        const err = await res.json();
                        throw new Error(err.message);
                    }
                } catch(error) {
                    this.showSyncStatus('同步失败', 'error');
                    this.showToast('推送到 GitHub 失败: ' + error.message, 'error');
                    return false;
                }
            },

            loadPosts() {
                const saved = localStorage.getItem('blog_posts');
                if (saved) {
                    try {
                        this.posts = JSON.parse(saved);
                    } catch(e) { this.posts = []; }
                }
                if (!this.posts.length) {
                    this.posts = [{
                        id: '1',
                        title: '欢迎使用极简博客',
                        content: '## 特性\n- 毛玻璃效果\n- B站视频支持\n- GitHub 同步\n\n**管理员密码: bixie4.5**\n\n@bilibili:BV1GJ411x7h7',
                        date: new Date().toLocaleDateString('zh-CN'),
                        excerpt: '欢迎使用极简博客'
                    }];
                    this.savePostsToLocal();
                }
                // 无论是否配置，都尝试从 GitHub 拉取（公开仓库）
                if (this.githubConfig) {
                    this.loadFromGitHub(true);
                }
            },

            savePostsToLocal() {
                localStorage.setItem('blog_posts', JSON.stringify(this.posts));
            },

            async savePosts() {
                this.savePostsToLocal();
                if (this.githubConfig && this.githubConfig.token) {
                    await this.pushToGitHub();
                }
            },

            loadProfile() {
                const saved = localStorage.getItem('blog_profile');
                if (saved) this.profile = JSON.parse(saved);
            },

            saveProfile() {
                localStorage.setItem('blog_profile', JSON.stringify(this.profile));
                this.renderProfile();
            },

            renderProfile() {
                document.getElementById('profileName').textContent = this.profile.name;
                document.getElementById('profileAvatar').textContent = this.profile.avatar;
                document.getElementById('profileBio').innerHTML = this.parseMarkdown(this.profile.bio);
                const btn = document.getElementById('editProfileBtn');
                if (btn) btn.style.display = this.isAdmin ? 'flex' : 'none';
            },

            editProfile() {
                if (!this.isAdmin) return;
                document.getElementById('editName').value = this.profile.name;
                document.getElementById('editAvatar').value = this.profile.avatar;
                document.getElementById('editBio').value = this.profile.bio;
                this.showModal('profileModal');
            },

            saveProfileFromEditor() {
                const name = document.getElementById('editName').value.trim();
                const avatar = document.getElementById('editAvatar').value.trim() || '✨';
                const bio = document.getElementById('editBio').value.trim() || '暂无介绍';
                if (!name) return this.showToast('昵称不能为空', 'error');
                this.profile = { name, avatar, bio };
                this.saveProfile();
                this.closeModal('profileModal');
                this.showToast('个人介绍已更新');
                if (this.githubConfig && this.githubConfig.token) this.pushToGitHub();
            },

            render() {
                this.renderProfile();
                const grid = document.getElementById('blogGrid');
                if (!this.posts.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无文章</p></div>';
                    return;
                }
                grid.innerHTML = this.posts.map(post => `
                    <article class="blog-card acrylic" onclick="app.showDetail('${post.id}')">
                        <h3>${this.escapeHtml(post.title)}</h3>
                        <div class="blog-meta"><i class="far fa-calendar"></i> ${post.date}</div>
                        <div class="blog-excerpt">${this.escapeHtml(post.excerpt || post.content.substring(0, 80))}...</div>
                        <div class="read-more">阅读全文 <i class="fas fa-arrow-right"></i></div>
                    </article>
                `).join('');
                document.getElementById('postCount').textContent = this.posts.length;
            },

            parseMarkdown(text) {
                if (!text) return '';
                text = text.replace(/@bilibili:(BV[a-zA-Z0-9]+)/gi, (m, bvid) => `
                    <div class="bilibili-wrapper"><div class="bilibili-player"><iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=0" allowfullscreen></iframe></div></div>
                `);
                text = text.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy">');
                text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
                text = text.replace(/^### (.*$)/gm, '<h3>$1</h3>');
                text = text.replace(/^## (.*$)/gm, '<h2>$1</h2>');
                text = text.replace(/^# (.*$)/gm, '<h1>$1</h1>');
                text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                return text.split(/\n\n/).map(p => p.trim() ? (p.startsWith('<') ? p : `<p>${p}</p>`) : '').join('');
            },

            loadGiscusForPost(postId) {
                const container = document.getElementById('giscus-comments');
                if (!container) return;
                container.innerHTML = '';
                const script = document.createElement('script');
                script.src = GISCUS_BASE_CONFIG.src;
                Object.keys(GISCUS_BASE_CONFIG).forEach(key => {
                    if (key !== 'src' && key !== 'async') {
                        script.setAttribute(key, GISCUS_BASE_CONFIG[key]);
                    }
                });
                script.setAttribute('data-term', `post-${postId}`);
                script.async = true;
                container.appendChild(script);
            },

            showDetail(id) {
                const post = this.posts.find(p => p.id === id);
                if (!post) return;
                this.currentPostId = id;
                document.getElementById('detailTitle').textContent = post.title;
                document.getElementById('detailContent').innerHTML = this.parseMarkdown(post.content);
                const actions = document.getElementById('detailActions');
                if (this.isAdmin) {
                    actions.innerHTML = `
                        <button class="btn btn-secondary" onclick="app.editPost('${id}')">编辑</button>
                        <button class="btn btn-secondary" style="background:#dc3545;color:#fff;" onclick="app.deletePost('${id}')">删除</button>
                    `;
                } else {
                    actions.innerHTML = '';
                }
                this.loadGiscusForPost(id);
                this.showModal('detailModal');
            },

            openEditor(id = null) {
                if (!this.isAdmin) return this.showToast('请先登录', 'error');
                this.editingPostId = id;
                const title = document.getElementById('postTitle');
                const content = document.getElementById('postContent');
                if (id) {
                    const post = this.posts.find(p => p.id === id);
                    title.value = post.title;
                    content.value = post.content;
                } else {
                    title.value = '';
                    content.value = '';
                }
                this.showModal('editorModal');
            },

            editPost(id) {
                this.closeModal('detailModal');
                setTimeout(() => this.openEditor(id), 200);
            },

            async savePost() {
                const title = document.getElementById('postTitle').value.trim();
                const content = document.getElementById('postContent').value.trim();
                if (!title || !content) return this.showToast('标题和内容不能为空', 'error');
                const now = new Date().toLocaleDateString('zh-CN');
                if (this.editingPostId) {
                    const idx = this.posts.findIndex(p => p.id === this.editingPostId);
                    if (idx !== -1) {
                        this.posts[idx] = { ...this.posts[idx], title, content, excerpt: content.substring(0, 100), date: now };
                    }
                } else {
                    this.posts.unshift({ id: Date.now().toString(), title, content, excerpt: content.substring(0, 100), date: now });
                }
                await this.savePosts();
                this.render();
                this.closeModal('editorModal');
                this.showToast(this.editingPostId ? '已更新' : '已发布');
                this.editingPostId = null;
            },

            async deletePost(id) {
                if (!confirm('确定删除？')) return;
                this.posts = this.posts.filter(p => p.id !== id);
                await this.savePosts();
                this.render();
                this.closeModal('detailModal');
                this.showToast('已删除');
            },

            openBilibiliDialog() {
                document.getElementById('bilibiliInput').value = '';
                this.showModal('bilibiliModal');
            },

            insertBilibili() {
                const input = document.getElementById('bilibiliInput').value;
                const match = input.match(/BV[a-zA-Z0-9]{10}/);
                if (!match) return this.showToast('无效的BV号', 'error');
                const textarea = document.getElementById('postContent');
                const insert = `\n@bilibili:${match[0]}\n`;
                const start = textarea.selectionStart;
                textarea.value = textarea.value.substring(0, start) + insert + textarea.value.substring(start);
                this.closeModal('bilibiliModal');
                this.showToast('已插入');
            },

            insertImage() {
                const url = prompt('图片URL');
                if (url) this.insertToEditor(`![图片](${url})`);
            },

            insertLink() {
                const text = prompt('链接文字');
                if (text) {
                    const url = prompt('链接URL');
                    if (url) this.insertToEditor(`[${text}](${url})`);
                }
            },

            insertToEditor(text) {
                const ta = document.getElementById('postContent');
                const start = ta.selectionStart;
                ta.value = ta.value.substring(0, start) + text + ta.value.substring(start);
                ta.focus();
            },

            checkAuth() {
                const auth = localStorage.getItem('blog_auth');
                if (auth) {
                    try {
                        const data = JSON.parse(auth);
                        if (data.expires > Date.now()) this.isAdmin = true;
                    } catch(e) {}
                }
            },

            showLogin() {
                const modal = document.getElementById('loginModal');
                if (!modal) return;
                const pwd = document.getElementById('loginPassword');
                if (pwd) pwd.value = '';
                const err = document.getElementById('loginError');
                if (err) err.style.display = 'none';
                this.showModal('loginModal');
                setTimeout(() => pwd?.focus(), 100);
            },

            login() {
                const pwd = document.getElementById('loginPassword');
                if (pwd?.value === 'bixie4.5') {
                    this.isAdmin = true;
                    localStorage.setItem('blog_auth', JSON.stringify({ expires: Date.now() + 86400000 }));
                    this.updateUI();
                    this.renderProfile();
                    this.closeModal('loginModal');
                    this.showToast('登录成功');
                    if (!this.githubConfig) document.getElementById('setupBanner').style.display = 'flex';
                } else {
                    const err = document.getElementById('loginError');
                    if (err) err.style.display = 'block';
                    if (pwd) pwd.value = '';
                }
            },

            logout() {
                this.isAdmin = false;
                localStorage.removeItem('blog_auth');
                this.updateUI();
                this.renderProfile();
                this.showToast('已退出');
            },

            updateUI() {
                const guest = document.getElementById('guestActions');
                const admin = document.getElementById('adminActions');
                if (guest) guest.style.display = this.isAdmin ? 'none' : 'block';
                if (admin) admin.style.display = this.isAdmin ? 'flex' : 'none';
            },

            showDataManager() {
                if (!this.isAdmin) return this.showToast('请先登录', 'error');
                if (this.githubConfig) {
                    document.getElementById('githubOwner').value = this.githubConfig.owner || '';
                    document.getElementById('githubRepo').value = this.githubConfig.repo || '';
                    document.getElementById('githubBranch').value = this.githubConfig.branch || 'main';
                    document.getElementById('githubToken').value = this.githubConfig.token || '';
                }
                document.getElementById('localPostCount').textContent = this.posts.length;
                this.updateJSONExport();
                this.showModal('dataModal');
            },

            switchMode(mode) {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
                document.getElementById('githubModePanel').style.display = mode === 'github' ? 'block' : 'none';
                document.getElementById('localModePanel').style.display = mode === 'local' ? 'block' : 'none';
                document.getElementById('manualModePanel').style.display = mode === 'manual' ? 'block' : 'none';
            },

            updateJSONExport() {
                const data = { posts: this.posts, profile: this.profile };
                document.getElementById('jsonExportArea').value = JSON.stringify(data, null, 2);
            },

            copyJSON() {
                const ta = document.getElementById('jsonExportArea');
                ta.select();
                document.execCommand('copy');
                this.showToast('已复制');
            },

            downloadJSON() {
                const data = document.getElementById('jsonExportArea').value;
                const blob = new Blob([data], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'blog-data.json';
                a.click();
                URL.revokeObjectURL(a.href);
            },

            importFromJSON() {
                try {
                    const data = JSON.parse(document.getElementById('jsonImportArea').value);
                    if (data.posts) this.posts = data.posts;
                    if (data.profile) this.profile = data.profile;
                    this.savePostsToLocal();
                    this.saveProfile();
                    this.render();
                    this.showToast('导入成功');
                    document.getElementById('jsonImportArea').value = '';
                    if (this.githubConfig && this.githubConfig.token) this.pushToGitHub();
                } catch(e) {
                    this.showToast('JSON 格式错误', 'error');
                }
            },

            exportToFile() {
                const data = { posts: this.posts, profile: this.profile };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `blog-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(a.href);
                this.showToast('备份已下载');
            },

            importFromFile() {
                document.getElementById('fileInput').click();
            },

            handleFileImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.posts) this.posts = data.posts;
                        if (data.profile) this.profile = data.profile;
                        this.savePostsToLocal();
                        this.saveProfile();
                        this.render();
                        this.showToast('导入成功');
                        if (this.githubConfig && this.githubConfig.token) this.pushToGitHub();
                    } catch(err) {
                        this.showToast('文件解析失败', 'error');
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            },

            showSyncStatus(text, status) {
                const indicator = document.getElementById('syncIndicator');
                const statusDot = document.getElementById('syncStatusDot');
                const textSpan = document.getElementById('syncText');
                textSpan.textContent = text;
                statusDot.className = 'sync-status';
                if (status === 'syncing') statusDot.classList.add('syncing');
                else if (status === 'error') statusDot.classList.add('error');
                indicator.classList.remove('hidden');
                if (status !== 'syncing') {
                    setTimeout(() => indicator.classList.add('hidden'), 3000);
                }
            },

            showModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            },

            closeModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            },

            closeModalOnOverlay(event, id) {
                if (event.target === event.currentTarget) this.closeModal(id);
            },

            showToast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = `toast ${type} show`;
                setTimeout(() => toast.classList.remove('show'), 3000);
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            goHome() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
