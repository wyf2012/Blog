<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>极简博客 | 现代创作空间</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
            background: #fafaf9;
            color: #1c1917;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 导航栏 */
        .navbar {
            padding: 20px 0;
            border-bottom: 1px solid #e5e5e5;
            background: rgba(250, 250, 249, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1a1a1a;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #333;
        }

        .btn-danger {
            background: white;
            color: #dc2626;
            border-color: #fecaca;
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        /* 文章网格 */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .blog-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f0f0f0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
        }

        .blog-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .blog-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 15px;
        }

        .blog-excerpt {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            color: #999;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #666;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1100;
            animation: slideIn 0.3s;
            font-size: 14px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
            .nav-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container nav-content">
        <div class="logo" id="logoHome">✍️ 极简日志</div>
        <div class="nav-links">
            <a href="#" id="homeLink" style="text-decoration: none; color: #333;">首页</a>
            <div id="loginSection">
                <button class="btn" id="showLoginBtn">管理登录</button>
            </div>
            <div id="adminSection" style="display: none;">
                <button class="btn" id="newPostBtn">+ 写文章</button>
                <button class="btn" id="logoutBtn">退出</button>
                <span class="status-badge">✓ 已登录</span>
            </div>
        </div>
    </div>
</div>

<main class="container">
    <div id="postsContainer" class="blog-grid"></div>
</main>

<!-- 登录模态框 -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>管理员登录</span>
            <button class="close-btn" onclick="closeModal('loginModal')">&times;</button>
        </div>
        <div>
            <input type="text" id="loginUser" placeholder="用户名" autocomplete="off">
            <input type="password" id="loginPass" placeholder="密码">
            <div id="loginErrorMsg" style="color: red; font-size: 12px; margin: 5px 0;"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-primary" id="loginBtn" style="flex:1;">登录</button>
                <button class="btn" id="rememberLoginBtn" style="flex:1;">记住我</button>
            </div>
            <div style="margin-top: 15px; font-size: 12px; color: #999; text-align: center;">
                演示账号: admin / 123456
            </div>
        </div>
    </div>
</div>

<!-- 文章编辑模态框 -->
<div id="editorModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="editorTitle">写新文章</span>
            <button class="close-btn" onclick="closeModal('editorModal')">&times;</button>
        </div>
        <div>
            <input type="text" id="postTitle" placeholder="文章标题">
            <input type="text" id="postSummary" placeholder="摘要（可选）">
            <textarea id="postBody" rows="10" placeholder="文章内容..."></textarea>
            <div id="editorError" style="color: red; font-size: 12px;"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-primary" id="savePostBtn" style="flex:1;">保存</button>
                <button class="btn" onclick="closeModal('editorModal')">取消</button>
            </div>
        </div>
    </div>
</div>

<!-- 文章详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <span id="detailTitle"></span>
            <button class="close-btn" onclick="closeModal('detailModal')">&times;</button>
        </div>
        <div id="detailBody" style="line-height: 1.7;"></div>
        <div id="detailActions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;"></div>
    </div>
</div>

<script>
    // 简单的 Markdown 解析器（避免外部库问题）
    function simpleMarkdown(text) {
        if (!text) return '';
        
        // 转义 HTML
        let html = text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
        
        // 标题
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
        
        // 粗体和斜体
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        
        // 代码块
        html = html.replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>');
        html = html.replace(/`(.*?)`/g, '<code>$1</code>');
        
        // 链接
        html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
        
        // 列表
        html = html.replace(/^\s*-\s(.*)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        
        // 段落
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';
        html = html.replace(/<p><\/p>/g, '');
        
        return html;
    }

    // 数据存储
    let posts = [];
    let isAdmin = false;
    let editPostId = null;
    
    // GitHub 配置
    let githubToken = '';
    let githubOwner = '';
    let githubRepo = '';
    
    // 加载保存的配置
    function loadConfig() {
        try {
            githubToken = localStorage.getItem('gh_token') || '';
            githubOwner = localStorage.getItem('gh_owner') || '';
            githubRepo = localStorage.getItem('gh_repo') || '';
            
            const savedLogin = localStorage.getItem('admin_logged_in');
            const loginExpiry = localStorage.getItem('admin_expiry');
            if (savedLogin === 'true' && loginExpiry && Date.now() < parseInt(loginExpiry)) {
                isAdmin = true;
                updateUIForAdmin(true);
            }
        } catch(e) {
            console.log('加载配置失败');
        }
    }
    
    function updateUIForAdmin(loggedIn) {
        const loginSection = document.getElementById('loginSection');
        const adminSection = document.getElementById('adminSection');
        if (loggedIn) {
            loginSection.style.display = 'none';
            adminSection.style.display = 'flex';
        } else {
            loginSection.style.display = 'block';
            adminSection.style.display = 'none';
        }
    }
    
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.background = isError ? '#dc2626' : '#1f2937';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.style.display = 'none';
    }
    
    // 保存文章到本地和 GitHub
    async function savePosts() {
        // 保存到本地
        localStorage.setItem('blog_posts', JSON.stringify(posts));
        
        // 如果配置了 GitHub，同步到远程
        if (githubToken && githubOwner && githubRepo) {
            try {
                const content = btoa(encodeURIComponent(JSON.stringify(posts, null, 2)));
                const url = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/posts.json`;
                
                let sha = '';
                const getRes = await fetch(url, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                }
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `更新博客 - ${new Date().toLocaleString('zh-CN')}`,
                        content: content,
                        sha: sha,
                        branch: 'main'
                    })
                });
                
                if (response.ok) {
                    showToast('已同步到 GitHub');
                }
            } catch(e) {
                console.log('GitHub 同步失败:', e);
            }
        }
    }
    
    // 加载文章
    async function loadPosts() {
        // 尝试从 GitHub 加载
        if (githubToken && githubOwner && githubRepo) {
            try {
                const url = `https://api.github.com/repos/${githubOwner}/${githubRepo}/contents/posts.json`;
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    const content = decodeURIComponent(escape(atob(data.content)));
                    posts = JSON.parse(content);
                    localStorage.setItem('blog_posts', JSON.stringify(posts));
                    renderPosts();
                    return;
                }
            } catch(e) {
                console.log('从 GitHub 加载失败');
            }
        }
        
        // 从本地加载
        const saved = localStorage.getItem('blog_posts');
        if (saved) {
            try {
                posts = JSON.parse(saved);
            } catch(e) {
                posts = getDefaultPosts();
            }
        } else {
            posts = getDefaultPosts();
        }
        renderPosts();
    }
    
    function getDefaultPosts() {
        return [
            {
                id: '1',
                title: '欢迎使用极简博客',
                summary: '这是一个干净、优雅的个人博客系统',
                content: '## 功能介绍\n\n- 支持 Markdown 格式\n- 文章管理功能\n- GitHub 同步备份\n\n开始创作吧！',
                date: new Date().toLocaleDateString('zh-CN'),
                slug: 'welcome'
            },
            {
                id: '2',
                title: 'Markdown 示例',
                summary: '学习如何使用 Markdown 书写文章',
                content: '# 标题示例\n\n## 二级标题\n\n**粗体文字** *斜体文字*\n\n- 列表项 1\n- 列表项 2\n\n[链接示例](https://github.com)',
                date: new Date().toLocaleDateString('zh-CN'),
                slug: 'markdown-example'
            }
        ];
    }
    
    function renderPosts() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        
        if (posts.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 60px; color: #999;">暂无文章，管理员请登录后发布</div>';
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="blog-card" onclick="viewPost('${post.id}')">
                <div class="blog-title">${escapeHtml(post.title)}</div>
                <div class="blog-meta">📅 ${escapeHtml(post.date)}</div>
                <div class="blog-excerpt">${escapeHtml(post.summary || post.content.substring(0, 100))}...</div>
                <button class="btn" style="font-size: 13px; padding: 6px 16px;">阅读全文 →</button>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function viewPost(id) {
        const post = posts.find(p => p.id === id);
        if (!post) return;
        
        document.getElementById('detailTitle').textContent = post.title;
        document.getElementById('detailBody').innerHTML = simpleMarkdown(post.content);
        
        const actionsDiv = document.getElementById('detailActions');
        if (isAdmin) {
            actionsDiv.innerHTML = `
                <button class="btn" onclick="editPost('${post.id}')">✏️ 编辑</button>
                <button class="btn btn-danger" onclick="deletePost('${post.id}')">🗑️ 删除</button>
            `;
        } else {
            actionsDiv.innerHTML = '';
        }
        
        document.getElementById('detailModal').style.display = 'flex';
    }
    
    function editPost(id) {
        closeModal('detailModal');
        const post = posts.find(p => p.id === id);
        if (post) {
            editPostId = id;
            document.getElementById('editorTitle').textContent = '编辑文章';
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postSummary').value = post.summary || '';
            document.getElementById('postBody').value = post.content;
            document.getElementById('editorModal').style.display = 'flex';
        }
    }
    
    async function deletePost(id) {
        if (confirm('确定要删除这篇文章吗？')) {
            posts = posts.filter(p => p.id !== id);
            await savePosts();
            renderPosts();
            closeModal('detailModal');
            showToast('文章已删除');
        }
    }
    
    async function saveCurrentPost() {
        const title = document.getElementById('postTitle').value.trim();
        const summary = document.getElementById('postSummary').value.trim();
        const content = document.getElementById('postBody').value.trim();
        
        if (!title || !content) {
            document.getElementById('editorError').textContent = '标题和内容不能为空';
            return;
        }
        
        document.getElementById('editorError').textContent = '';
        
        const now = new Date().toLocaleDateString('zh-CN');
        
        if (editPostId) {
            const index = posts.findIndex(p => p.id === editPostId);
            if (index !== -1) {
                posts[index] = {
                    ...posts[index],
                    title: title,
                    summary: summary,
                    content: content,
                    date: now
                };
            }
            editPostId = null;
        } else {
            const newPost = {
                id: Date.now().toString(),
                title: title,
                summary: summary,
                content: content,
                date: now,
                slug: title.replace(/\s+/g, '-')
            };
            posts.unshift(newPost);
        }
        
        await savePosts();
        renderPosts();
        closeModal('editorModal');
        showToast('文章已保存');
    }
    
    // 登录处理
    function login(remember = false) {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        
        if (username === 'admin' && password === '123456') {
            isAdmin = true;
            updateUIForAdmin(true);
            
            const expiry = remember ? Date.now() + 30 * 24 * 60 * 60 * 1000 : Date.now() + 24 * 60 * 60 * 1000;
            localStorage.setItem('admin_logged_in', 'true');
            localStorage.setItem('admin_expiry', expiry.toString());
            
            closeModal('loginModal');
            showToast(remember ? '登录成功，状态将保持30天' : '登录成功，24小时后过期');
            
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginErrorMsg').textContent = '';
            
            // 提示配置 GitHub
            if (!githubToken) {
                setTimeout(() => {
                    if (confirm('是否配置 GitHub 备份？\n配置后文章会自动同步到仓库')) {
                        configureGitHub();
                    }
                }, 500);
            }
        } else {
            document.getElementById('loginErrorMsg').textContent = '用户名或密码错误';
        }
    }
    
    function logout() {
        isAdmin = false;
        localStorage.removeItem('admin_logged_in');
        localStorage.removeItem('admin_expiry');
        updateUIForAdmin(false);
        renderPosts();
        showToast('已退出登录');
    }
    
    function configureGitHub() {
        const token = prompt('请输入 GitHub Personal Access Token (需要 repo 权限):');
        if (!token) return;
        const owner = prompt('GitHub 用户名:');
        if (!owner) return;
        const repo = prompt('仓库名称:');
        if (!repo) return;
        
        githubToken = token;
        githubOwner = owner;
        githubRepo = repo;
        
        localStorage.setItem('gh_token', token);
        localStorage.setItem('gh_owner', owner);
        localStorage.setItem('gh_repo', repo);
        
        showToast('GitHub 配置已保存');
        loadPosts(); // 重新加载，尝试从 GitHub 同步
    }
    
    // 事件绑定
    document.addEventListener('DOMContentLoaded', () => {
        loadConfig();
        loadPosts();
        
        document.getElementById('showLoginBtn')?.addEventListener('click', () => {
            document.getElementById('loginModal').style.display = 'flex';
        });
        
        document.getElementById('loginBtn')?.addEventListener('click', () => login(false));
        document.getElementById('rememberLoginBtn')?.addEventListener('click', () => login(true));
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('newPostBtn')?.addEventListener('click', () => {
            editPostId = null;
            document.getElementById('editorTitle').textContent = '写新文章';
            document.getElementById('postTitle').value = '';
            document.getElementById('postSummary').value = '';
            document.getElementById('postBody').value = '';
            document.getElementById('editorModal').style.display = 'flex';
        });
        document.getElementById('savePostBtn')?.addEventListener('click', saveCurrentPost);
        document.getElementById('homeLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            renderPosts();
        });
        document.getElementById('logoHome')?.addEventListener('click', () => renderPosts());
        
        // 添加 GitHub 配置按钮到管理栏
        const adminSection = document.getElementById('adminSection');
        if (adminSection && !document.getElementById('ghConfigBtn')) {
            const ghBtn = document.createElement('button');
            ghBtn.id = 'ghConfigBtn';
            ghBtn.className = 'btn';
            ghBtn.textContent = '⚙️ GitHub';
            ghBtn.style.marginLeft = '5px';
            ghBtn.onclick = configureGitHub;
            adminSection.appendChild(ghBtn);
        }
        
        // 点击模态框背景关闭
        window.onclick = (e) => {
            if (e.target.classList && e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        };
    });
    
    // 全局函数
    window.viewPost = viewPost;
    window.editPost = editPost;
    window.deletePost = deletePost;
    window.closeModal = closeModal;
</script>
</body>
</html>
