<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极简博客 | 基于 GitHub 的静态博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Fluent 色彩系统 */
            --acrylic-bg: rgba(243, 243, 243, 0.85);
            --acrylic-bg-solid: #f3f3f3;
            --acrylic-border: rgba(0, 0, 0, 0.0578);
            --acrylic-border-strong: rgba(0, 0, 0, 0.08);
            --acrylic-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
            --acrylic-shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.08), 0 8px 32px rgba(0, 0, 0, 0.12);
            
            /* Fluent 强调色 - 更柔和的蓝 */
            --accent-color: #005FB8;
            --accent-hover: #0067C0;
            --accent-pressed: #1975C5;
            --accent-light: rgba(0, 95, 184, 0.08);
            --accent-medium: rgba(0, 95, 184, 0.15);
            
            /* 文字层级 */
            --text-primary: rgba(0, 0, 0, 0.8956);
            --text-secondary: rgba(0, 0, 0, 0.6063);
            --text-tertiary: rgba(0, 0, 0, 0.4458);
            --text-disabled: rgba(0, 0, 0, 0.3614);
            
            /* 表面色彩 */
            --surface-bg: #f9f9f9;
            --surface-card: rgba(255, 255, 255, 0.5);
            --surface-hover: rgba(0, 0, 0, 0.0373);
            --surface-pressed: rgba(0, 0, 0, 0.0578);
            --surface-selected: rgba(0, 95, 184, 0.06);
            
            /* 控件 */
            --control-bg: rgba(255, 255, 255, 0.7);
            --control-border: rgba(0, 0, 0, 0.08);
            --control-hover: rgba(255, 255, 255, 0.9);
            --control-pressed: rgba(255, 255, 255, 1);
            
            /* 深度层级 */
            --elevation-1: 0 1px 2px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.06);
            --elevation-2: 0 2px 4px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.06);
            --elevation-3: 0 4px 8px rgba(0,0,0,0.04), 0 8px 16px rgba(0,0,0,0.08);
            --elevation-4: 0 8px 16px rgba(0,0,0,0.06), 0 16px 32px rgba(0,0,0,0.1);
            
            /* 动效 */
            --transition-fast: 0.083s cubic-bezier(0.4, 0, 1, 1);
            --transition-normal: 0.167s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* 圆角系统 */
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-full: 999px;
            
            /* 间距系统 */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 20px;
            --space-2xl: 24px;
            --space-3xl: 32px;
            --space-4xl: 48px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --acrylic-bg: rgba(32, 32, 32, 0.85);
                --acrylic-bg-solid: #202020;
                --acrylic-border: rgba(255, 255, 255, 0.08);
                --acrylic-border-strong: rgba(255, 255, 255, 0.12);
                --acrylic-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.4);
                --acrylic-shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.4), 0 8px 32px rgba(0, 0, 0, 0.5);
                
                --accent-color: #4CC2FF;
                --accent-hover: #5CC8FF;
                --accent-pressed: #6CCEFF;
                --accent-light: rgba(76, 194, 255, 0.1);
                --accent-medium: rgba(76, 194, 255, 0.2);
                
                --text-primary: rgba(255, 255, 255, 0.8956);
                --text-secondary: rgba(255, 255, 255, 0.6063);
                --text-tertiary: rgba(255, 255, 255, 0.4458);
                --text-disabled: rgba(255, 255, 255, 0.3614);
                
                --surface-bg: #1c1c1c;
                --surface-card: rgba(43, 43, 43, 0.6);
                --surface-hover: rgba(255, 255, 255, 0.0419);
                --surface-pressed: rgba(255, 255, 255, 0.0698);
                --surface-selected: rgba(76, 194, 255, 0.08);
                
                --control-bg: rgba(255, 255, 255, 0.08);
                --control-border: rgba(255, 255, 255, 0.08);
                --control-hover: rgba(255, 255, 255, 0.12);
                --control-pressed: rgba(255, 255, 255, 0.16);
            }
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--surface-bg);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            font-size: 14px;
            font-weight: 400;
        }

        /* Fluent 亚克力材质 - 带噪点纹理 */
        .acrylic {
            background: var(--acrylic-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--acrylic-border);
            box-shadow: var(--acrylic-shadow);
            position: relative;
            overflow: hidden;
        }

        .acrylic::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .acrylic > * {
            position: relative;
            z-index: 1;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--space-2xl);
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-radius: 0;
            padding: var(--space-sm) var(--space-2xl);
            border-bottom: 1px solid var(--acrylic-border);
            transition: var(--transition-normal);
            animation: slideDown 0.5s var(--transition-smooth);
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-fast);
            user-select: none;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
        }

        .logo:hover {
            background: var(--surface-hover);
        }

        .logo i {
            color: var(--accent-color);
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: var(--space-xs);
            align-items: center;
        }

        /* Fluent 按钮样式 */
        .nav-btn {
            background: transparent;
            border: none;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 400;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--surface-hover);
            opacity: 0;
            transition: var(--transition-fast);
            border-radius: var(--radius-md);
        }

        .nav-btn:hover::after {
            opacity: 1;
        }

        .nav-btn:active::after {
            background: var(--surface-pressed);
        }

        .nav-btn > * {
            position: relative;
            z-index: 1;
        }

        .nav-btn i {
            font-size: 14px;
            width: 16px;
            text-align: center;
        }

        .nav-btn.primary {
            background: var(--accent-color);
            color: white;
        }

        .nav-btn.primary::after {
            background: rgba(255,255,255,0.15);
        }

        .nav-btn.primary:hover {
            background: var(--accent-hover);
        }

        .nav-btn.primary:active {
            background: var(--accent-pressed);
            transform: scale(0.98);
        }

        .refresh-btn {
            background: var(--control-bg);
            border: 1px solid var(--control-border);
        }

        .refresh-btn:hover {
            background: var(--control-hover);
        }

        /* ===== 主内容区 ===== */
        main {
            padding-top: 80px;
            padding-bottom: 60px;
        }

        /* ===== 个人资料卡片 ===== */
        .profile-section {
            margin-bottom: var(--space-4xl);
            animation: fadeInUp 0.6s 0.1s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-card {
            border-radius: var(--radius-xl);
            padding: var(--space-3xl);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            border: 1px solid var(--acrylic-border-strong);
        }

        .profile-card:hover {
            box-shadow: var(--elevation-3);
            border-color: var(--acrylic-border-strong);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: var(--space-2xl);
            margin-bottom: var(--space-2xl);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--accent-color), #60CDFF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: var(--elevation-2);
            transition: var(--transition-smooth);
            flex-shrink: 0;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-full);
            border: 2px solid transparent;
            transition: var(--transition-smooth);
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .avatar:hover::after {
            border-color: var(--accent-color);
        }

        .profile-info h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .profile-bio {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
            max-width: 600px;
        }

        .profile-stats {
            display: flex;
            gap: var(--space-3xl);
            margin-top: var(--space-2xl);
            padding-top: var(--space-2xl);
            border-top: 1px solid var(--acrylic-border);
        }

        .stat {
            text-align: left;
            transition: var(--transition-fast);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
        }

        .stat:hover {
            background: var(--surface-hover);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: var(--space-xs);
            font-weight: 400;
        }

        .edit-profile-btn {
            position: absolute;
            top: var(--space-lg);
            right: var(--space-lg);
            background: var(--control-bg);
            border: 1px solid var(--control-border);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-4px);
            transition: var(--transition-normal);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-primary);
            backdrop-filter: blur(20px);
        }

        .edit-profile-btn:hover {
            background: var(--control-hover);
            border-color: var(--accent-color);
        }

        .profile-card:hover .edit-profile-btn {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== 区块标题 ===== */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--space-2xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            animation: fadeInUp 0.5s 0.2s both;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .refresh-indicator {
            font-size: 12px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-tertiary);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            transition: var(--transition-fast);
        }

        .refresh-indicator:hover {
            background: var(--surface-hover);
        }

        .refresh-indicator i {
            cursor: pointer;
            transition: var(--transition-smooth);
            color: var(--text-secondary);
        }

        .refresh-indicator i:hover {
            color: var(--accent-color);
            transform: rotate(180deg);
        }

        /* ===== 博客网格 ===== */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-lg);
            animation: fadeInUp 0.5s 0.3s both;
        }

        /* Fluent 卡片 - 带 Reveal 效果 */
        .blog-card {
            border-radius: var(--radius-lg);
            padding: var(--space-2xl);
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            background: var(--surface-card);
            border: 1px solid var(--acrylic-border);
        }

        /* Reveal 边框光效 */
        .blog-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: radial-gradient(
                600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 255, 255, 0.4),
                transparent 40%
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .blog-card:hover::before {
            opacity: 1;
        }

        .blog-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
            opacity: 0;
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .blog-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--elevation-3);
            border-color: var(--acrylic-border-strong);
        }

        .blog-card:hover::after {
            opacity: 1;
        }

        .blog-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            color: var(--text-primary);
            line-height: 1.4;
        }

        .blog-meta {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .blog-excerpt {
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 13px;
        }

        .read-more {
            margin-top: var(--space-lg);
            color: var(--accent-color);
            font-weight: 500;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            transition: var(--transition-fast);
        }

        .blog-card:hover .read-more {
            gap: var(--space-sm);
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px) saturate(125%);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--acrylic-bg);
            backdrop-filter: blur(60px) saturate(180%);
            border-radius: var(--radius-xl);
            border: 1px solid var(--acrylic-border-strong);
            box-shadow: var(--elevation-4);
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.95) translateY(16px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: var(--space-3xl);
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-2xl);
            padding-bottom: var(--space-lg);
            border-bottom: 1px solid var(--acrylic-border);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .close-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .close-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--surface-hover);
            opacity: 0;
            transition: var(--transition-fast);
            border-radius: var(--radius-md);
        }

        .close-btn:hover::after {
            opacity: 1;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .close-btn:active::after {
            background: var(--surface-pressed);
        }

        .close-btn > * {
            position: relative;
            z-index: 1;
        }

        /* ===== 表单 ===== */
        .form-group {
            margin-bottom: var(--space-xl);
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
            text-transform: none;
            letter-spacing: 0;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--control-border);
            border-radius: var(--radius-md);
            background: var(--control-bg);
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition-fast);
            outline: none;
        }

        .form-input:hover, .form-textarea:hover {
            background: var(--control-hover);
            border-color: var(--acrylic-border-strong);
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent-color);
            background: var(--control-pressed);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .form-textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            gap: var(--space-xs);
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
            padding: var(--space-sm);
            background: var(--surface-hover);
            border-radius: var(--radius-md);
        }

        .tool-btn {
            background: transparent;
            border: none;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .tool-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--surface-hover);
            opacity: 0;
            transition: var(--transition-fast);
            border-radius: var(--radius-sm);
        }

        .tool-btn:hover::after {
            opacity: 1;
        }

        .tool-btn:active::after {
            background: var(--surface-pressed);
        }

        .tool-btn > * {
            position: relative;
            z-index: 1;
        }

        /* ===== 按钮组 ===== */
        .btn-group {
            display: flex;
            gap: var(--space-md);
            margin-top: var(--space-2xl);
        }

        .btn {
            padding: var(--space-sm) var(--space-lg);
            border-radius: var(--radius-md);
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: var(--transition-fast);
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:active {
            background: var(--accent-pressed);
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--control-bg);
            color: var(--text-primary);
            border: 1px solid var(--control-border);
        }

        .btn-secondary:hover {
            background: var(--control-hover);
            border-color: var(--acrylic-border-strong);
        }

        .btn-secondary:active {
            background: var(--control-pressed);
            transform: scale(0.98);
        }

        /* ===== 文章内容 ===== */
        .article-content {
            line-height: 1.8;
            font-size: 15px;
            color: var(--text-primary);
        }

        .article-content h1, .article-content h2, .article-content h3 {
            margin-top: var(--space-2xl);
            margin-bottom: var(--space-md);
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-content h1 { font-size: 24px; }
        .article-content h2 { font-size: 20px; }
        .article-content h3 { font-size: 16px; }

        .article-content p {
            margin-bottom: var(--space-lg);
            color: var(--text-secondary);
        }

        .article-content img {
            max-width: 100%;
            border-radius: var(--radius-lg);
            margin: var(--space-2xl) 0;
            box-shadow: var(--elevation-2);
        }

        .article-content pre {
            background: var(--surface-bg);
            padding: var(--space-lg);
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: var(--space-lg) 0;
            border: 1px solid var(--acrylic-border);
        }

        .article-content code {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
        }

        .article-content pre code {
            color: var(--text-primary);
        }

        .article-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: var(--transition-fast);
        }

        .article-content a:hover {
            border-bottom-color: var(--accent-color);
        }

        .article-content strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .bilibili-wrapper {
            margin: var(--space-2xl) 0;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #000;
            position: relative;
            box-shadow: var(--elevation-2);
        }

        .bilibili-player {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .bilibili-player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .giscus-container {
            margin-top: var(--space-4xl);
            padding-top: var(--space-3xl);
            border-top: 1px solid var(--acrylic-border);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: var(--space-2xl);
            right: var(--space-2xl);
            background: var(--acrylic-bg);
            backdrop-filter: blur(40px) saturate(150%);
            color: var(--text-primary);
            padding: var(--space-md) var(--space-xl);
            border-radius: var(--radius-lg);
            border: 1px solid var(--acrylic-border);
            box-shadow: var(--elevation-3);
            z-index: 3000;
            transform: translateY(100px) scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-size: 13px;
            font-weight: 400;
        }

        .toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .toast.error {
            border-left: 3px solid #FF99A4;
        }

        .toast.success {
            border-left: 3px solid #6CCB5F;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: var(--space-4xl) var(--space-2xl);
            color: var(--text-tertiary);
        }

        .empty-state i {
            font-size: 32px;
            margin-bottom: var(--space-md);
            display: block;
            opacity: 0.5;
        }

        /* ===== 管理员徽章 ===== */
        .admin-badge {
            background: var(--accent-light);
            color: var(--accent-color);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            border: 1px solid var(--accent-medium);
        }

        /* ===== 同步指示器 ===== */
        .sync-indicator {
            position: fixed;
            bottom: var(--space-2xl);
            left: var(--space-2xl);
            background: var(--acrylic-bg);
            backdrop-filter: blur(40px) saturate(150%);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            border: 1px solid var(--acrylic-border);
            z-index: 2500;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            transition: var(--transition-smooth);
            font-size: 12px;
            color: var(--text-secondary);
            box-shadow: var(--elevation-2);
        }

        .sync-indicator.hidden {
            transform: translateY(100px);
            opacity: 0;
        }

        .sync-status {
            width: 6px;
            height: 6px;
            border-radius: var(--radius-full);
            background: #6CCB5F;
            flex-shrink: 0;
        }

        .sync-status.syncing { 
            background: #FFC107; 
            animation: pulse 1.5s ease-in-out infinite; 
        }
        .sync-status.error { 
            background: #FF99A4; 
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* ===== 信息框 ===== */
        .info-box {
            background: var(--accent-light);
            border-left: 3px solid var(--accent-color);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-xl);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .info-box strong {
            color: var(--text-primary);
        }

        .info-box code {
            background: var(--surface-hover);
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-family: 'Cascadia Code', monospace;
            font-size: 12px;
            color: var(--accent-color);
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-disabled);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: var(--space-sm) var(--space-lg);
            }
            .nav-links { gap: var(--space-xs); }
            .nav-btn span { display: none; }
            .nav-btn { padding: var(--space-sm); }
            main { padding-top: 72px; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
            .blog-grid { grid-template-columns: 1fr; }
            .modal { width: 95%; padding: var(--space-2xl); }
            .edit-profile-btn {
                position: static;
                margin-top: var(--space-md);
                opacity: 1;
                transform: none;
            }
            .section-title { flex-direction: column; align-items: flex-start; gap: var(--space-sm); }
            .container { padding: 0 var(--space-lg); }
        }

        /* ===== 选中状态 ===== */
        ::selection {
            background: var(--accent-light);
            color: var(--text-primary);
        }

        /* ===== 焦点环 ===== */
        :focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
    </style>
</head>

    <script>
        const GISCUS_BASE_CONFIG = {
            src: 'https://giscus.app/client.js',
            'data-repo': 'wyf2012/Blog',
            'data-repo-id': 'R_kgDORzrk5w',
            'data-category': 'Announcements',
            'data-category-id': 'DIC_kwDORzrk584C5jXz',
            'data-mapping': 'specific',
            'data-strict': '0',
            'data-reactions-enabled': '1',
            'data-emit-metadata': '0',
            'data-input-position': 'bottom',
            'data-theme': 'preferred_color_scheme',
            'data-lang': 'zh-CN',
            crossorigin: 'anonymous',
            async: true
        };

        // 固定的 GitHub 仓库信息 - 访客无需配置
        const GITHUB_OWNER = 'wyf2012';
        const GITHUB_REPO = 'Blog';
        const GITHUB_BRANCH = 'main';
        const POSTS_PATH = 'data/posts.json';
        const PROFILE_PATH = 'data/profile.json'; // 新增：个人资料存储路径

        const app = {
            posts: [],
            isAdmin: false,
            editingPostId: null,
            githubToken: null,
            postsSha: null,
            profileSha: null, // 新增：个人资料文件的sha
            profile: { name: '极简博主', avatar: '✨', bio: '欢迎来到我的博客！这里记录着我的思考与创作。' },
            currentPostId: null,
            lastSyncTime: null,

            init() {
                this.loadToken();
                this.checkAuth();
                this.loadProfileFromGitHub(); // 修改：从GitHub加载个人资料
                this.loadPostsFromGitHub();
                this.startAutoSync();
            },

            startAutoSync() {
                // 每5分钟自动同步一次
                setInterval(() => {
                    this.loadPostsFromGitHub(true);
                    this.loadProfileFromGitHub(); // 新增：自动同步个人资料
                }, 300000);
            },

            updateLastSyncTimeDisplay() {
                const timeSpan = document.getElementById('lastSyncTime');
                if (this.lastSyncTime) {
                    const date = new Date(this.lastSyncTime);
                    timeSpan.textContent = `上次同步: ${date.toLocaleTimeString()}`;
                } else {
                    timeSpan.textContent = '加载中...';
                }
            },

            async refreshFromGitHub() {
                await this.loadPostsFromGitHub(false);
                await this.loadProfileFromGitHub(); // 新增：刷新个人资料
            },

            // 新增：从GitHub加载个人资料
            async loadProfileFromGitHub() {
                try {
                    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PROFILE_PATH}?ref=${GITHUB_BRANCH}`;
                    const res = await fetch(url);
                    
                    if (res.status === 404) {
                        // 文件不存在，使用默认资料并尝试创建
                        this.profile = { name: '极简博主', avatar: '✨', bio: '欢迎来到我的博客！这里记录着我的思考与创作。' };
                        this.saveProfileToLocal();
                        this.renderProfile();
                        // 如果是管理员且有Token，尝试推送默认资料
                        if (this.isAdmin && this.githubToken) {
                            this.pushProfileToGitHub('创建默认个人资料');
                        }
                        return;
                    }
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    
                    const data = await res.json();
                    const content = this.base64ToUtf8(data.content);
                    this.profile = JSON.parse(content);
                    this.profileSha = data.sha;
                    this.saveProfileToLocal();
                    this.renderProfile();
                    
                } catch (error) {
                    console.error('Failed to load profile from GitHub:', error);
                    // 如果从GitHub加载失败，尝试从本地加载
                    this.loadProfileFromLocal();
                }
            },

            // 修改：从本地加载个人资料
            loadProfileFromLocal() {
                const saved = localStorage.getItem('blog_profile');
                if (saved) {
                    try {
                        this.profile = JSON.parse(saved);
                    } catch(e) {
                        this.profile = { name: '极简博主', avatar: '✨', bio: '欢迎来到我的博客！这里记录着我的思考与创作。' };
                    }
                }
                this.renderProfile();
            },

            // 修改：保存个人资料到本地
            saveProfileToLocal() {
                localStorage.setItem('blog_profile', JSON.stringify(this.profile));
                this.renderProfile();
            },

            // 新增：推送个人资料到GitHub
            async pushProfileToGitHub(commitMessage = 'Update profile') {
                if (!this.githubToken) {
                    this.showToast('请先在同步设置中配置 GitHub Token 以同步个人资料', 'error');
                    return false;
                }
                
                const content = this.utf8ToBase64(JSON.stringify(this.profile, null, 2));
                const body = { 
                    message: commitMessage, 
                    content, 
                    branch: GITHUB_BRANCH 
                };
                if (this.profileSha) body.sha = this.profileSha;
                
                this.showSyncStatus('正在同步个人资料到 GitHub...', 'syncing');
                
                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${PROFILE_PATH}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `token ${this.githubToken}`, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const result = await res.json();
                        this.profileSha = result.content.sha;
                        this.showToast('个人资料已同步到 GitHub', 'success');
                        this.showSyncStatus('同步完成', 'success');
                        return true;
                    } else {
                        const err = await res.json();
                        throw new Error(err.message);
                    }
                } catch(error) {
                    this.showSyncStatus('同步失败', 'error');
                    this.showToast('同步个人资料到 GitHub 失败: ' + error.message, 'error');
                    return false;
                }
            },

            loadToken() {
                const token = localStorage.getItem('github_token');
                if (token) {
                    this.githubToken = token;
                }
            },

            saveToken() {
                const token = document.getElementById('githubToken').value.trim();
                if (token) {
                    this.githubToken = token;
                    localStorage.setItem('github_token', token);
                    this.showToast('Token 已保存，现在可以推送文章和个人资料了', 'success');
                } else {
                    this.githubToken = null;
                    localStorage.removeItem('github_token');
                    this.showToast('Token 已清除，将只能读取文章', 'success');
                }
                this.closeModal('dataModal');
            },

            utf8ToBase64(str) {
                const bytes = new TextEncoder().encode(str);
                const binary = Array.from(bytes, b => String.fromCharCode(b)).join('');
                return btoa(binary);
            },

            base64ToUtf8(base64) {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            },

            async loadPostsFromGitHub(silent = false) {
                if (!silent) {
                    this.showSyncStatus('正在从 GitHub 加载文章...', 'syncing');
                    document.getElementById('blogGrid').innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>正在从 GitHub 加载文章...</p></div>';
                }
                
                try {
                    // 公开仓库不需要 token，直接访问
                    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${POSTS_PATH}?ref=${GITHUB_BRANCH}`;
                    const res = await fetch(url);
                    
                    if (res.status === 404) {
                        // 文件不存在，创建默认文章
                        this.createDefaultPosts();
                        if (!silent) this.showToast('GitHub 上暂无数据，已创建默认文章', 'warning');
                        return;
                    }
                    
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    
                    const data = await res.json();
                    const content = this.base64ToUtf8(data.content);
                    const remotePosts = JSON.parse(content);
                    
                    this.posts = remotePosts;
                    this.postsSha = data.sha;
                    this.savePostsToLocal();
                    this.render();
                    
                    this.lastSyncTime = Date.now();
                    this.updateLastSyncTimeDisplay();
                    
                    if (!silent) this.showToast(`已加载 ${this.posts.length} 篇文章`, 'success');
                    this.showSyncStatus('同步完成', 'success');
                    
                } catch (error) {
                    console.error('Failed to load from GitHub:', error);
                    // 如果从 GitHub 加载失败，尝试从本地加载
                    this.loadPostsFromLocal();
                    if (!silent) this.showToast('从 GitHub 加载失败，使用本地缓存', 'error');
                    this.showSyncStatus('同步失败', 'error');
                }
            },

            createDefaultPosts() {
                this.posts = [{
                    id: '1',
                    title: '欢迎使用极简博客',
                    content: `## 欢迎！

这是一个基于 GitHub 存储的极简博客系统。

### 特性

- ✨ **毛玻璃效果** - 现代 Fluent Design
- 🎬 **B站视频** - 使用 \`@bilibili:BV号\` 插入视频
- 💬 **评论系统** - 基于 Giscus 的 GitHub Discussions
- 🔄 **自动同步** - 访客自动从 GitHub 读取文章

### 管理员密码

\`bixie4.5\`

### 示例视频

@bilibili:BV1GJ411x7h7

开始你的创作吧！`,
                    date: new Date().toLocaleDateString('zh-CN'),
                    excerpt: '欢迎使用极简博客系统'
                }];
                this.savePostsToLocal();
                this.render();
                // 如果是管理员，尝试推送
                if (this.isAdmin && this.githubToken) {
                    this.pushToGitHub();
                }
            },

            loadPostsFromLocal() {
                const saved = localStorage.getItem('blog_posts');
                if (saved) {
                    try {
                        this.posts = JSON.parse(saved);
                    } catch(e) { 
                        this.posts = [];
                    }
                }
                if (!this.posts.length) {
                    this.createDefaultPosts();
                }
                this.render();
            },

            savePostsToLocal() {
                localStorage.setItem('blog_posts', JSON.stringify(this.posts));
            },

            async pushToGitHub() {
                if (!this.githubToken) {
                    this.showToast('请先在同步设置中配置 GitHub Token', 'error');
                    return false;
                }
                
                const content = this.utf8ToBase64(JSON.stringify(this.posts, null, 2));
                const body = { 
                    message: `Update posts ${new Date().toISOString()}`, 
                    content, 
                    branch: GITHUB_BRANCH 
                };
                if (this.postsSha) body.sha = this.postsSha;
                
                this.showSyncStatus('正在推送到 GitHub...', 'syncing');
                
                try {
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${POSTS_PATH}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `token ${this.githubToken}`, 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const result = await res.json();
                        this.postsSha = result.content.sha;
                        this.showToast('文章已同步到 GitHub', 'success');
                        this.showSyncStatus('同步完成', 'success');
                        return true;
                    } else {
                        const err = await res.json();
                        throw new Error(err.message);
                    }
                } catch(error) {
                    this.showSyncStatus('同步失败', 'error');
                    this.showToast('推送到 GitHub 失败: ' + error.message, 'error');
                    return false;
                }
            },

            // 修改：渲染个人资料时，根据管理员状态显示/隐藏编辑按钮
            renderProfile() {
                document.getElementById('profileName').textContent = this.profile.name;
                document.getElementById('profileAvatar').textContent = this.profile.avatar;
                document.getElementById('profileBio').innerHTML = this.parseMarkdown(this.profile.bio);
                
                // 关键修改：仅在管理员模式下显示编辑按钮
                const editBtn = document.getElementById('editProfileBtn');
                if (editBtn) {
                    editBtn.style.display = this.isAdmin ? 'flex' : 'none';
                }
            },

            // 修改：编辑个人资料时检查管理员权限
            editProfile() {
                if (!this.isAdmin) {
                    this.showToast('请先登录管理员账号', 'error');
                    this.showLogin();
                    return;
                }
                
                document.getElementById('editName').value = this.profile.name;
                document.getElementById('editAvatar').value = this.profile.avatar;
                document.getElementById('editBio').value = this.profile.bio;
                this.showModal('profileModal');
            },

            // 修改保存个人资料的方法，添加GitHub同步
            async saveProfileFromEditor() {
                if (!this.isAdmin) {
                    this.showToast('仅管理员可编辑个人资料', 'error');
                    return;
                }
                
                const name = document.getElementById('editName').value.trim();
                const avatar = document.getElementById('editAvatar').value.trim() || '✨';
                const bio = document.getElementById('editBio').value.trim() || '暂无介绍';
                
                if (!name) {
                    this.showToast('昵称不能为空', 'error');
                    return;
                }
                
                this.profile = { name, avatar, bio };
                this.saveProfileToLocal();
                this.closeModal('profileModal');
                this.showToast('个人介绍已更新');
                
                // 同步到GitHub
                await this.pushProfileToGitHub(`更新个人资料: ${name}`);
            },

            render() {
                this.renderProfile();
                const grid = document.getElementById('blogGrid');
                if (!this.posts.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无文章</p></div>';
                    return;
                }
                grid.innerHTML = this.posts.map(post => `
                    <article class="blog-card acrylic" onclick="app.showDetail('${post.id}')">
                        <h3>${this.escapeHtml(post.title)}</h3>
                        <div class="blog-meta"><i class="far fa-calendar"></i> ${post.date}</div>
                        <div class="blog-excerpt">${this.escapeHtml(post.excerpt || post.content.substring(0, 80))}...</div>
                        <div class="read-more">阅读全文 <i class="fas fa-arrow-right"></i></div>
                    </article>
                `).join('');
                document.getElementById('postCount').textContent = this.posts.length;
            },

            parseMarkdown(text) {
                if (!text) return '';
                text = text.replace(/@bilibili:(BV[a-zA-Z0-9]+)/gi, (m, bvid) => `
                    <div class="bilibili-wrapper"><div class="bilibili-player"><iframe src="https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=0" allowfullscreen></iframe></div></div>
                `);
                text = text.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy">');
                text = text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
                text = text.replace(/^### (.*$)/gm, '<h3>$1</h3>');
                text = text.replace(/^## (.*$)/gm, '<h2>$1</h2>');
                text = text.replace(/^# (.*$)/gm, '<h1>$1</h1>');
                text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                return text.split(/\n\n/).map(p => p.trim() ? (p.startsWith('<') ? p : `<p>${p}</p>`) : '').join('');
            },

            loadGiscusForPost(postId) {
                const container = document.getElementById('giscus-comments');
                if (!container) return;
                container.innerHTML = '';
                const script = document.createElement('script');
                script.src = GISCUS_BASE_CONFIG.src;
                Object.keys(GISCUS_BASE_CONFIG).forEach(key => {
                    if (key !== 'src' && key !== 'async') {
                        script.setAttribute(key, GISCUS_BASE_CONFIG[key]);
                    }
                });
                script.setAttribute('data-term', `post-${postId}`);
                script.async = true;
                container.appendChild(script);
            },

            showDetail(id) {
                const post = this.posts.find(p => p.id === id);
                if (!post) return;
                this.currentPostId = id;
                document.getElementById('detailTitle').textContent = post.title;
                document.getElementById('detailContent').innerHTML = this.parseMarkdown(post.content);
                const actions = document.getElementById('detailActions');
                if (this.isAdmin) {
                    actions.innerHTML = `
                        <button class="btn btn-secondary" onclick="app.editPost('${id}')">编辑</button>
                        <button class="btn btn-secondary" style="background:#dc3545;color:#fff;" onclick="app.deletePost('${id}')">删除</button>
                    `;
                } else {
                    actions.innerHTML = '';
                }
                this.loadGiscusForPost(id);
                this.showModal('detailModal');
            },

            openEditor(id = null) {
                if (!this.isAdmin) return this.showToast('请先登录', 'error');
                this.editingPostId = id;
                const title = document.getElementById('postTitle');
                const content = document.getElementById('postContent');
                if (id) {
                    const post = this.posts.find(p => p.id === id);
                    title.value = post.title;
                    content.value = post.content;
                } else {
                    title.value = '';
                    content.value = '';
                }
                this.showModal('editorModal');
            },

            editPost(id) {
                this.closeModal('detailModal');
                setTimeout(() => this.openEditor(id), 200);
            },

            async savePost() {
                const title = document.getElementById('postTitle').value.trim();
                const content = document.getElementById('postContent').value.trim();
                if (!title || !content) return this.showToast('标题和内容不能为空', 'error');
                const now = new Date().toLocaleDateString('zh-CN');
                if (this.editingPostId) {
                    const idx = this.posts.findIndex(p => p.id === this.editingPostId);
                    if (idx !== -1) {
                        this.posts[idx] = { ...this.posts[idx], title, content, excerpt: content.substring(0, 100), date: now };
                    }
                } else {
                    this.posts.unshift({ id: Date.now().toString(), title, content, excerpt: content.substring(0, 100), date: now });
                }
                this.savePostsToLocal();
                this.render();
                this.closeModal('editorModal');
                this.showToast(this.editingPostId ? '已更新' : '已发布');
                this.editingPostId = null;
                
                // 如果有 Token，推送到 GitHub
                if (this.githubToken) {
                    await this.pushToGitHub();
                } else {
                    this.showToast('未配置 Token，文章仅保存在本地', 'warning');
                }
            },

            async deletePost(id) {
                if (!confirm('确定删除？')) return;
                this.posts = this.posts.filter(p => p.id !== id);
                this.savePostsToLocal();
                this.render();
                this.closeModal('detailModal');
                this.showToast('已删除');
                if (this.githubToken) {
                    await this.pushToGitHub();
                }
            },

            openBilibiliDialog() {
                document.getElementById('bilibiliInput').value = '';
                this.showModal('bilibiliModal');
            },

            insertBilibili() {
                const input = document.getElementById('bilibiliInput').value;
                const match = input.match(/BV[a-zA-Z0-9]{10}/);
                if (!match) return this.showToast('无效的BV号', 'error');
                const textarea = document.getElementById('postContent');
                const insert = `\n@bilibili:${match[0]}\n`;
                const start = textarea.selectionStart;
                textarea.value = textarea.value.substring(0, start) + insert + textarea.value.substring(start);
                this.closeModal('bilibiliModal');
                this.showToast('已插入');
            },

            insertImage() {
                const url = prompt('图片URL');
                if (url) this.insertToEditor(`![图片](${url})`);
            },

            insertLink() {
                const text = prompt('链接文字');
                if (text) {
                    const url = prompt('链接URL');
                    if (url) this.insertToEditor(`[${text}](${url})`);
                }
            },

            insertToEditor(text) {
                const ta = document.getElementById('postContent');
                const start = ta.selectionStart;
                ta.value = ta.value.substring(0, start) + text + ta.value.substring(start);
                ta.focus();
            },

            checkAuth() {
                const auth = localStorage.getItem('blog_auth');
                if (auth) {
                    try {
                        const data = JSON.parse(auth);
                        if (data.expires > Date.now()) {
                            this.isAdmin = true;
                        }
                    } catch(e) {}
                }
            },

            showLogin() {
                const pwd = document.getElementById('loginPassword');
                if (pwd) pwd.value = '';
                const err = document.getElementById('loginError');
                if (err) err.style.display = 'none';
                this.showModal('loginModal');
                setTimeout(() => pwd?.focus(), 100);
            },

            login() {
                const pwd = document.getElementById('loginPassword');
                if (pwd?.value === 'bixie4.5') {
                    this.isAdmin = true;
                    localStorage.setItem('blog_auth', JSON.stringify({ expires: Date.now() + 86400000 }));
                    this.updateUI();
                    this.closeModal('loginModal');
                    this.showToast('登录成功');
                } else {
                    const err = document.getElementById('loginError');
                    if (err) err.style.display = 'block';
                    if (pwd) pwd.value = '';
                }
            },

            logout() {
                this.isAdmin = false;
                localStorage.removeItem('blog_auth');
                this.updateUI();
                this.showToast('已退出');
            },

            updateUI() {
                const guest = document.getElementById('guestActions');
                const admin = document.getElementById('adminActions');
                if (guest) guest.style.display = this.isAdmin ? 'none' : 'block';
                if (admin) admin.style.display = this.isAdmin ? 'flex' : 'none';
                
                // 确保个人资料编辑按钮状态同步更新
                this.renderProfile();
            },

            showDataManager() {
                if (!this.isAdmin) return this.showToast('请先登录', 'error');
                document.getElementById('githubToken').value = this.githubToken || '';
                this.showModal('dataModal');
            },

            showSyncStatus(text, status) {
                const indicator = document.getElementById('syncIndicator');
                const statusDot = document.getElementById('syncStatusDot');
                const textSpan = document.getElementById('syncText');
                textSpan.textContent = text;
                statusDot.className = 'sync-status';
                if (status === 'syncing') statusDot.classList.add('syncing');
                else if (status === 'error') statusDot.classList.add('error');
                indicator.classList.remove('hidden');
                if (status !== 'syncing') {
                    setTimeout(() => indicator.classList.add('hidden'), 3000);
                }
            },

            showModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            },

            closeModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                }
            },

            closeModalOnOverlay(event, id) {
                if (event.target === event.currentTarget) this.closeModal(id);
            },

            showToast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = `toast ${type} show`;
                setTimeout(() => toast.classList.remove('show'), 3000);
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            goHome() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                document.body.style.overflow = '';
            }
        });

        // Fluent Reveal 效果 - 追踪鼠标位置
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.blog-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', x + 'px');
                card.style.setProperty('--mouse-y', y + 'px');
            });
        });
    </script>
</body>
</html>
